function sod(d){ const x=new Date(d); x.setHours(0,0,0,0); return x; }
function parseISO(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function fmt(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
const DOW=['日','月','火','水','木','金','土'];
function fmtDisp(s){ const [y,m,d]=s.split('-'); const dt=new Date(Number(y),Number(m)-1,Number(d)); return `${y}/${m}/${d}(${DOW[dt.getDay()]})`; }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function addMonths(d,n){
  const day=d.getDate();
  const x=new Date(d); x.setDate(1); x.setMonth(x.getMonth()+n);
  const last=new Date(x.getFullYear(),x.getMonth()+1,0).getDate();
  x.setDate(Math.min(day,last)); return x;
}
function isAfter(a,b){ return a.getTime()>b.getTime(); }
function isBefore(a,b){ return a.getTime()<b.getTime(); }

// ─── Forecast ─────────────────────────────────────────
function expandRec(tx, startD, endD, skippedKeys){
  const evts=[];
  const base=sod(parseISO(tx.startDate));
  const lim=tx.endDate ? new Date(Math.min(sod(parseISO(tx.endDate)),endD)) : endD;
  const overrides=tx.overrides||{};
  for(let n=0;n<1500;n++){
    let cur;
    if(tx.frequency==='daily') cur=addDays(base,n);
    else if(tx.frequency==='weekly') cur=addDays(base,n*7);
    else if(tx.frequency==='monthly') cur=addMonths(base,n);
    else if(tx.frequency==='yearly') cur=addMonths(base,n*12);
    else break;
    cur=sod(cur);
    if(isAfter(cur,lim)) break;
    const biz=tx.adjustBizDay;
    const adj=biz==='prev'||biz===true ? sod(prevBizDay(cur)) : biz==='next' ? sod(nextBizDay(cur)) : cur;
    if(!isBefore(adj,startD)){
      const ds=fmt(adj);
      if(!skippedKeys||!skippedKeys.has(`${tx.id}_${ds}`)){
        const raw=overrides[ds]!==undefined ? overrides[ds] : tx.amount;
        const amt=tx.type==='income'?raw:tx.type==='transfer'?raw:-raw;
        evts.push({date:adj,amt});
      }
    }
  }
  return evts;
}

function buildForecast(accounts, txs, endD, skippedKeys){
  const today=todayD();
  const bal={};
  const asOf={};
  accounts.forEach(a=>{ bal[a.id]=a.balance; if(a.balanceAsOf) asOf[a.id]=a.balanceAsOf; });
  const evts=[];
  txs.forEach(tx=>{
    if(tx.recurring){
      if(tx.type==='transfer'){
        expandRec(tx,today,endD,skippedKeys).forEach(e=>{
          evts.push({date:e.date,amt:-e.amt,aid:tx.fromAccountId});
          evts.push({date:e.date,amt:e.amt,aid:tx.toAccountId});
        });
      } else {
        expandRec(tx,today,endD,skippedKeys).forEach(e=>evts.push({date:e.date,amt:e.amt,aid:tx.accountId}));
      }
    } else {
      const d=sod(parseISO(tx.startDate));
      const ds=fmt(d);
      if(!isBefore(d,today)&&!isAfter(d,endD)&&(!skippedKeys||!skippedKeys.has(`${tx.id}_${ds}`))){
        if(tx.type==='transfer'){
          evts.push({date:d,amt:-tx.amount,aid:tx.fromAccountId});
          evts.push({date:d,amt:tx.amount,aid:tx.toAccountId});
        } else {
          evts.push({date:d,amt:tx.type==='income'?tx.amount:-tx.amount,aid:tx.accountId});
        }
      }
    }
  });
  evts.sort((a,b)=>a.date-b.date);
  const res=[];
  const cur={...bal};
  let ei=0;
  let cursor=new Date(today);
  while(!isAfter(cursor,endD)){
    const ds=fmt(cursor);
    while(ei<evts.length&&!isAfter(evts[ei].date,cursor)){
      const ev=evts[ei];
      const aOf=asOf[ev.aid];
      if(!(aOf && fmt(ev.date)<=aOf) && cur[ev.aid]!==undefined) cur[ev.aid]+=ev.amt;
      ei++;
    }
    const row={date:ds};
    let tot=0;
    accounts.forEach(a=>{ row[a.id]=Math.round(cur[a.id]); tot+=cur[a.id]; });
    row.total=Math.round(tot);
    res.push(row);
    cursor=addDays(cursor,1);
  }
  return res;
}

        });

    } else {
      const d=sod(parseISO(tx.startDate));

// ─── Historical Forecast (past) ───────────────────────
function buildHistoricalForecast(accounts, txs, startD, skippedKeys){
  const today=todayD();
  const evts=[];
  txs.forEach(tx=>{
    if(tx.recurring){
      if(tx.type==='transfer'){
        expandRec(tx,startD,today,skippedKeys).forEach(e=>{
          evts.push({date:e.date,amt:-e.amt,aid:tx.fromAccountId});
          evts.push({date:e.date,amt:e.amt,aid:tx.toAccountId});
        });
      } else {
        expandRec(tx,startD,today,skippedKeys).forEach(e=>evts.push({date:e.date,amt:e.amt,aid:tx.accountId}));
      }
    } else {
      const d=sod(parseISO(tx.startDate));
      const ds=fmt(d);
      if(!isBefore(d,startD)&&!isAfter(d,today)&&(!skippedKeys||!skippedKeys.has(`${tx.id}_${ds}`))){
        if(tx.type==='transfer'){
          evts.push({date:d,amt:-tx.amount,aid:tx.fromAccountId});
          evts.push({date:d,amt:tx.amount,aid:tx.toAccountId});
        } else {
          evts.push({date:d,amt:tx.type==='income'?tx.amount:-tx.amount,aid:tx.accountId});
        }
      }
    }
  });
  const evtsByDate={};
  evts.forEach(ev=>{const ds=fmt(ev.date);if(!evtsByDate[ds])evtsByDate[ds]=[];evtsByDate[ds].push(ev);});
  const cur={};
  const asOf={};
  accounts.forEach(a=>{cur[a.id]=a.balance; if(a.balanceAsOf) asOf[a.id]=a.balanceAsOf;});
  const rows=[];
  let cursor=new Date(today);
  while(!isBefore(cursor,startD)){
    const ds=fmt(cursor);
    const row={date:ds};let tot=0;
    accounts.forEach(a=>{row[a.id]=Math.round(cur[a.id]);tot+=cur[a.id];});
    row.total=Math.round(tot);
    rows.unshift(row);
    if(evtsByDate[ds]) evtsByDate[ds].forEach(ev=>{
      const aOf=asOf[ev.aid];
      if(aOf && fmt(ev.date)>=aOf) return;
      if(cur[ev.aid]!==undefined) cur[ev.aid]-=ev.amt;
    });
    cursor=addDays(cursor,-1);
  }
  return rows;
}

// ─── Monthly breakdown (実績/予測 共通) ─────────────────
// startD〜endD の収入・支出を「名前×口座」単位で集計する。
// 定期取引はスケジュールから展開、単発取引は期間内のものを含める。
function computeBreakdown(txs, startD, endD, skippedKeys){
  const incMap={},expMap={};
  txs.forEach(tx=>{
    if(tx.type==='transfer') return;
    const target=tx.type==='income'?incMap:expMap;
    const key=tx.label;
    const add=amt=>{
      if(!target[key]) target[key]={label:tx.label,category:tx.category||'',total:0,count:0};
      target[key].total+=amt; target[key].count++;
    };
    if(tx.recurring){
      expandRec(tx,startD,endD,skippedKeys).forEach(e=>add(Math.abs(e.amt)));
    } else if(tx.startDate){
      const d=sod(parseISO(tx.startDate));
      const ds=fmt(d);
      if(!isBefore(d,startD)&&!isAfter(d,endD)&&!(skippedKeys&&skippedKeys.has(`${tx.id}_${ds}`))) add(tx.amount);
    }
  });
  const incomeItems=Object.values(incMap).sort((a,b)=>b.total-a.total);
  const expenseItems=Object.values(expMap).sort((a,b)=>b.total-a.total);
  return {
    incomeItems, expenseItems,
    incTotal:incomeItems.reduce((s,it)=>s+it.total,0),
    expTotal:expenseItems.reduce((s,it)=>s+it.total,0),
  };
}

const COLORS=['#6366f1','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16'];
const CATS=['給与','家賃','食費','交通費','光熱費','保険','娯楽','その他'];
const FREQS={daily:'毎日',weekly:'毎週',monthly:'毎月',yearly:'毎年'};
const PERIODS=[
  {label:'過去6ヶ月',months:-6},
  {label:'過去3ヶ月',months:-3},

];
const EXPENSE_CATS=CATS.filter(c=>c!=='給与');

function monthBounds(base){
  const d=sod(base);
  return {
    start:sod(new Date(d.getFullYear(),d.getMonth(),1)),
    end:sod(new Date(d.getFullYear(),d.getMonth()+1,0))
  };
}
function buildMonthlyStats(txs,base,skippedKeys,throughToday=false){
  const {start,end:rawEnd}=monthBounds(base);
  const end=throughToday&&base.getMonth()===todayD().getMonth()&&base.getFullYear()===todayD().getFullYear()?todayD():rawEnd;
  const byCategory={}; let income=0,expense=0;
  txs.forEach(tx=>{
    if(tx.type==='transfer') return;
    const addAmount=(amount)=>{
      const n=Math.abs(Number(amount)||0);
      if(tx.type==='income') income+=n;
      else {expense+=n; const cat=tx.category||'その他'; byCategory[cat]=(byCategory[cat]||0)+n;}
    };
    if(tx.recurring){
      expandRec(tx,start,end,skippedKeys).forEach(e=>addAmount(e.amt));
    } else if(tx.startDate){
      const d=sod(parseISO(tx.startDate)),ds=fmt(d);
      if(!isBefore(d,start)&&!isAfter(d,end)&&(!skippedKeys||!skippedKeys.has(`${tx.id}_${ds}`))) addAmount(tx.amount);
    }
  });
  return {income,expense,net:income-expense,byCategory,start,end};
}
function findShortfalls(accounts,forecast){
  const found=[];
  accounts.forEach(account=>{
    const first=forecast.find(row=>Number(row[account.id])<0);
    if(!first) return;
    found.push({account,date:first.date,shortage:Math.abs(Number(first[account.id]))});
  });
  return found.sort((a,b)=>a.date.localeCompare(b.date));
}
function downloadBlob(name,content,type){
  const blob=new Blob([content],{type});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),0);
}
function downloadFullBackup(data){
  downloadBlob(`cashflow_backup_${todayStr()}.json`,JSON.stringify({version:2,exportedAt:new Date().toISOString(),...data},null,2),'application/json');
}
function parseCsvRows(text){
  const rows=[]; let row=[],cell='',quoted=false;
  const src=String(text||'').replace(/^\uFEFF/,'');
  for(let i=0;i<src.length;i++){
    const ch=src[i];
    if(quoted){
      if(ch==='"'&&src[i+1]==='"'){cell+='"';i++;}
      else if(ch==='"') quoted=false;
      else cell+=ch;
    } else if(ch==='"') quoted=true;
    else if(ch===','){row.push(cell);cell='';}
    else if(ch==='\n'){row.push(cell.replace(/\r$/,''));rows.push(row);row=[];cell='';}
    else cell+=ch;
  }
  if(cell||row.length){row.push(cell.replace(/\r$/,''));rows.push(row);}
  return rows.filter(r=>r.some(v=>String(v).trim()));
}
function transactionsFromCsv(text,accounts){
  const rows=parseCsvRows(text); if(rows.length<2) return {items:[],skipped:0};
  const headers=rows[0].map(v=>v.trim());
  const idx=name=>headers.indexOf(name);
  const accountByName=Object.fromEntries(accounts.map(a=>[a.name,a]));
  let skipped=0;
  const items=rows.slice(1).map(row=>{
    const typeLabel=row[idx('種別')]||'支出';
    const type=typeLabel==='収入'?'income':typeLabel==='振替'?'transfer':'expense';
    const rawAmount=parseJpAmt(row[idx('金額')]);
    const account=accountByName[row[idx('口座')]];
    const toAccount=accountByName[row[idx('振替先口座')]];
    if(!row[idx('名前')]||!rawAmount||(!account&&type!=='transfer')||(type==='transfer'&&(!account||!toAccount||account.id===toAccount.id))){skipped++;return null;}
    const freqLabel=row[idx('頻度')]||'単発';
    const frequency=Object.entries(FREQS).find(([,label])=>label===freqLabel)?.[0]||'monthly';
    return {id:genId(),label:row[idx('名前')].trim(),type,amount:Math.abs(rawAmount),category:row[idx('カテゴリ')]||'その他',accountId:type==='transfer'?'':(account?.id||''),fromAccountId:type==='transfer'?account.id:'',toAccountId:type==='transfer'?toAccount.id:'',overrides:{},recurring:freqLabel!=='単発',frequency,startDate:row[idx('開始日')]||todayStr(),endDate:row[idx('終了日')]||null,adjustBizDay:''};
  }).filter(Boolean);
  return {items,skipped};
}

function Toast({ toasts }){
  if(!toasts.length) return null;
  return h('div',{className:'fixed bottom-24 right-4 z-[100] space-y-2 pointer-events-none'},
    toasts.map(t=>h('div',{key:t.id,
      className:`px-4 py-3 rounded-xl shadow-xl text-sm font-semibold text-white flex items-center gap-2 ${t.type==='error'?'bg-red-600':'bg-emerald-600'}`},
      t.type==='error'
        ? h('svg',{className:'w-4 h-4 flex-shrink-0',fill:'none',stroke:'currentColor',viewBox:'0 0 24 24'},
            h('path',{strokeLinecap:'round',strokeLinejoin:'round',strokeWidth:2,d:'M6 18L18 6M6 6l12 12'}))
        : h('svg',{className:'w-4 h-4 flex-shrink-0',fill:'none',stroke:'currentColor',viewBox:'0 0 24 24'},
            h('path',{strokeLinecap:'round',strokeLinejoin:'round',strokeWidth:2,d:'M5 13l4 4L19 7'})),
      t.message
    ))
  );
}

// ─── Confirm Dialog ────────────────────────────────────
function ConfirmDialog({ title, message, onConfirm, onCancel }){
  useEffect(()=>{const fn=e=>{if(e.key==='Escape')onCancel();};document.addEventListener('keydown',fn);return()=>document.removeEventListener('keydown',fn);},[onCancel]);
  return h('div',{className:'fixed inset-0 bg-black/50 dark:bg-black/70 flex items-center justify-center z-[200] px-4',onClick:e=>{if(e.target===e.currentTarget)onCancel();}},
    h('div',{role:'alertdialog','aria-modal':'true','aria-labelledby':'confirm-title','aria-describedby':'confirm-message',className:'bg-white dark:bg-gray-900 rounded-2xl shadow-2xl w-full max-w-sm p-6'},
      title&&h('h3',{id:'confirm-title',className:'text-base font-semibold text-gray-800 dark:text-gray-100 mb-2'},title),
      h('p',{id:'confirm-message',className:'text-sm text-gray-500 dark:text-gray-400 mb-5'},message),
      h('div',{className:'flex gap-3'},
        h('button',{onClick:onConfirm,className:'flex-1 bg-red-600 text-white py-2.5 rounded-xl text-sm font-semibold hover:bg-red-700 active:bg-red-800 transition-colors shadow-sm'},'削除する'),
        h('button',{onClick:onCancel,className:'flex-1 border border-gray-200 dark:border-gray-600 py-2.5 rounded-xl text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors'},'キャンセル')
      )
    )
  );
}

// ─── CSV export ────────────────────────────────────────
function downloadTxCsv(txs, accounts){
  const aMap=Object.fromEntries(accounts.map(a=>[a.id,a.name]));
  const header=['名前','種別','カテゴリ','口座','振替先口座','金額','頻度','開始日','終了日'];
  const rows=txs.map(tx=>[
    `"${(tx.label||'').replace(/"/g,'""')}"`,
    tx.type==='income'?'収入':tx.type==='transfer'?'振替':'支出',
    tx.category||'',
    aMap[tx.accountId]||aMap[tx.fromAccountId]||'',
    tx.type==='transfer'?(aMap[tx.toAccountId]||''):'',
    tx.type==='income'?tx.amount:-tx.amount,
    tx.recurring?(FREQS[tx.frequency]||tx.frequency):'単発',
    tx.startDate||'',
    tx.endDate||'',
  ]);
  const csv=[header,...rows].map(r=>r.join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`transactions_${fmt(new Date())}.csv`; a.click();
  URL.revokeObjectURL(url);
}

// ─── SVG Line Chart ───────────────────────────────────
function SvgChart({ data, accounts, dark, onDateClick, hiddenAccIds, onToggleAcc }){
  const W=700, H=260, PL=72, PR=20, PT=16, PB=40;
  const iW=W-PL-PR, iH=H-PT-PB;
  const gridColor=dark?'#1e293b':'#f1f5f9';
  const axisColor=dark?'#334155':'#e2e8f0';
  const tickColor=dark?'#94a3b8':'#64748b';
  const dotStroke=dark?'#0f172a':'#ffffff';

  if(!data.length) return h('div',{className:'flex items-center justify-center h-48 text-gray-400 dark:text-gray-500 text-sm'},'口座を追加するとグラフが表示されます');

  const keys=['total',...accounts.map(a=>a.id)];
  const colorMap={total:'#6366f1'};
  accounts.forEach(a=>{ colorMap[a.id]=a.color; });
  const nameMap={total:'合計'};
  accounts.forEach(a=>{ nameMap[a.id]=a.name; });

  const allVals=data.flatMap(d=>keys.map(k=>d[k]??0));
  let minV=Math.min(...allVals), maxV=Math.max(...allVals);
  if(minV===maxV){ minV-=10000; maxV+=10000; }
  const pad=(maxV-minV)*0.08;
  const yMin=minV-pad, yMax=maxV+pad;

  function xp(i){ return PL+i/(data.length-1||1)*iW; }
  function yp(v){ return PT+iH-(v-yMin)/(yMax-yMin)*iH; }
  function fmtY(v){ if(Math.abs(v)>=10000000) return (v/10000000).toFixed(1)+'千万'; if(Math.abs(v)>=10000) return Math.round(v/10000)+'万'; return Math.round(v/1000)+'k'; }

  const ticks=[];
  const step=Math.pow(10,Math.floor(Math.log10(Math.max(1,yMax-yMin)/5)));
  const tickStep=Math.ceil((yMax-yMin)/5/step)*step;
  let tv=Math.ceil(yMin/tickStep)*tickStep;
  while(tv<=yMax){ ticks.push(tv); tv+=tickStep; }

  const xTicks=[];
  const xi=Math.max(1,Math.floor(data.length/6));
  data.forEach((d,i)=>{ if(i%xi===0||i===data.length-1) xTicks.push({i,label:d.date.slice(5)}); });

  const [tip,setTip]=useState(null);

  function onMouseMove(e){
    const rect=e.currentTarget.getBoundingClientRect();
    const mx=e.clientX-rect.left;
    const ix=Math.round((mx-PL)/iW*(data.length-1));
    if(ix>=0&&ix<data.length) setTip({i:ix,x:xp(ix),d:data[ix]});
  }

  const tipStyle=dark
    ?{background:'#1e293b',border:'1px solid #334155',color:'#e2e8f0'}
    :{background:'#ffffff',border:'1px solid #e2e8f0',color:'#374151'};

  function onSvgClick(e){
    if(!onDateClick) return;
    const rect=e.currentTarget.getBoundingClientRect();
    const mx=e.clientX-rect.left;
    const ix=Math.round((mx-PL)/iW*(data.length-1));
    if(ix>=0&&ix<data.length) onDateClick(data[ix].date);
  }

  return h('div',{className:'relative'},
    h('svg',{width:'100%',viewBox:`0 0 ${W} ${H}`,style:{fontFamily:'inherit',cursor:onDateClick?'crosshair':undefined},onMouseMove,onMouseLeave:()=>setTip(null),onClick:onSvgClick},
      ticks.map(v=>h('line',{key:v,x1:PL,y1:yp(v),x2:W-PR,y2:yp(v),stroke:gridColor,strokeWidth:1})),
      ticks.map(v=>h('g',{key:'yt'+v},
        h('line',{x1:PL-4,y1:yp(v),x2:PL,y2:yp(v),stroke:axisColor,strokeWidth:1}),
        h('text',{x:PL-6,y:yp(v)+4,textAnchor:'end',fontSize:10,fill:tickColor},fmtY(v))
      )),
      xTicks.map(({i,label})=>h('g',{key:'xt'+i},
        h('line',{x1:xp(i),y1:PT+iH,x2:xp(i),y2:PT+iH+4,stroke:axisColor,strokeWidth:1}),
        h('text',{x:xp(i),y:PT+iH+16,textAnchor:'middle',fontSize:10,fill:tickColor},label)
      )),
      h('line',{x1:PL,y1:PT,x2:PL,y2:PT+iH,stroke:axisColor,strokeWidth:1}),
      h('line',{x1:PL,y1:PT+iH,x2:W-PR,y2:PT+iH,stroke:axisColor,strokeWidth:1}),
      [...accounts.map(a=>a.id),'total'].filter(k=>k==='total'||!hiddenAccIds||!hiddenAccIds.has(k)).map(k=>{
        const pts=data.map((d,i)=>`${xp(i)},${yp(d[k]??0)}`).join(' ');
        return h('polyline',{key:k,points:pts,fill:'none',stroke:colorMap[k],strokeWidth:k==='total'?2.5:1.5,strokeDasharray:k==='total'?undefined:'5,3',opacity:0.9});
      }),
      tip && h('line',{x1:tip.x,y1:PT,x2:tip.x,y2:PT+iH,stroke:dark?'#475569':'#94a3b8',strokeWidth:1,strokeDasharray:'3,2'}),
      tip && keys.filter(k=>k==='total'||!hiddenAccIds||!hiddenAccIds.has(k)).map(k=>h('circle',{key:k,cx:tip.x,cy:yp(tip.d[k]??0),r:4,fill:colorMap[k],stroke:dotStroke,strokeWidth:1.5}))
    ),
    tip && h('div',{
      className:'absolute rounded-lg shadow-lg p-2.5 text-xs pointer-events-none z-10',
      style:{top:'4px',left:Math.min(tip.x/W*100,65)+'%',...tipStyle}
    },
      h('p',{className:'font-semibold mb-1.5'},(()=>{const [y,m,d]=tip.d.date.split('-');const dt=new Date(Number(y),Number(m)-1,Number(d));return `${y}/${m}/${d}(${DOW[dt.getDay()]})`;})()),
      keys.filter(k=>k==='total'||!hiddenAccIds||!hiddenAccIds.has(k)).map(k=>{const v=tip.d[k]??0;return h('p',{key:k,className:'leading-5',style:{color:colorMap[k]}},`${nameMap[k]}: ${v<0?'-':''}¥${Math.abs(v).toLocaleString()}`)}),
      onDateClick&&h('p',{className:'mt-1.5 text-blue-400 text-[10px] font-medium'},'クリックして取引を追加')
    ),
    h('div',{className:'flex flex-wrap gap-3 mt-2 pl-16'},
      keys.map(k=>{
        const hidden=k!=='total'&&hiddenAccIds&&hiddenAccIds.has(k);
        return h('span',{key:k,
          className:`flex items-center gap-1.5 text-xs text-gray-500 dark:text-gray-400 transition-opacity select-none ${k!=='total'&&onToggleAcc?'cursor-pointer hover:opacity-70':''} ${hidden?'opacity-30 line-through':''}`,
          onClick:k!=='total'&&onToggleAcc?()=>onToggleAcc(k):undefined,
          title:k!=='total'&&onToggleAcc?(hidden?'クリックして表示':'クリックして非表示'):undefined
        },
          h('span',{className:'inline-block w-5',style:{height:'2px',backgroundColor:colorMap[k],borderRadius:'1px'}}),
          nameMap[k]
        );
      })
    )
  );
}

  function submit(e){
    e.preventDefault();
    if(!form.name.trim()){setErr('口座名を入力してください');return;}
    if(form.balance===''){setErr('残高を入力してください');return;}
    setErr('');
    const item={...form,balance:Number(form.balance)};
    if(editId){
      onChange(accounts.map(a=>{

        const merged={...a,...item};

      }));
      setEditId(null);

    confirmTarget&&h(ConfirmDialog,{

          h('input',{id:'account-name',className:inputCls,placeholder:'例: 普通預金',value:form.name,onChange:e=>sf('name',e.target.value)})
        ),
        h('div',null,
          h('label',{htmlFor:'account-bank',className:labelCls},'銀行名'),
          h('input',{id:'account-bank',className:inputCls,placeholder:'例: 三菱UFJ銀行',value:form.bankName,onChange:e=>sf('bankName',e.target.value)})
        ),
        h('div',null,
          h('label',{htmlFor:'account-balance',className:labelCls},'現在残高 (円) *'),
          h('input',{id:'account-balance',type:'number',className:inputCls,placeholder:'0',value:form.balance,onChange:e=>sf('balance',e.target.value)})

            COLORS.map(c=>h('button',{key:c,type:'button',onClick:()=>sf('color',c),

// ─── Amount parser (Japanese shorthand) ───────────────
function parseJpAmt(s){
  if(!s&&s!==0) return null;
  s=String(s).trim().replace(/,/g,'').replace(/[¥￥]/g,'');
  if(/^-?\d+$/.test(s)) return parseInt(s,10);
  if(/^-?\d+\.\d+$/.test(s)) return Math.round(parseFloat(s));
  const mMan=s.match(/^(\d+\.?\d*)\s*万\s*(\d+\.?\d*)?\s*千?$/);
  if(mMan){ return Math.round(parseFloat(mMan[1])*10000+(mMan[2]?parseFloat(mMan[2])*1000:0)); }
  const mSen=s.match(/^(\d+\.?\d*)\s*千$/);
  if(mSen) return Math.round(parseFloat(mSen[1])*1000);
  return null;
}

// ─── Transaction Manager ──────────────────────────────
function TxManager({ accounts, txs, onChange, addToast }){
  const DEF={label:'',type:'expense',amount:'',category:'その他',accountId:'',fromAccountId:'',toAccountId:'',overrides:{},recurring:false,frequency:'monthly',startDate:todayStr(),endDate:'',adjustBizDay:''};
  const [form,setForm]=useState(DEF);
  const [editId,setEditId]=useState(null);
  const [showForm,setShowForm]=useState(false);
  const [err,setErr]=useState('');
  const [sugs,setSugs]=useState([]);
  const [showSugs,setShowSugs]=useState(false);
  const [confirmTarget,setConfirmTarget]=useState(null);
  const [searchText,setSearchText]=useState('');
  const [filterType,setFilterType]=useState('all');
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));
  useEffect(()=>{if(!showForm)return;const fn=e=>{if(e.key==='Escape')cancel();};document.addEventListener('keydown',fn);return()=>document.removeEventListener('keydown',fn);},[showForm]);

  function handleLabelChange(val){
    sf('label',val);
    if(val.trim()){
      const seen=new Set();
      const matches=txs.filter(tx=>{
        if(!tx.label.toLowerCase().includes(val.toLowerCase())||seen.has(tx.label)) return false;
        seen.add(tx.label); return true;
      }).slice(0,6);
      setSugs(matches); setShowSugs(matches.length>0);
    } else { setShowSugs(false); }
  }
  function selectSug(tx){
    setForm(f=>({...f,label:tx.label,type:tx.type,amount:String(tx.amount),
      accountId:tx.accountId||'',fromAccountId:tx.fromAccountId||'',toAccountId:tx.toAccountId||'',
      recurring:tx.recurring,frequency:tx.frequency||'monthly',
      adjustBizDay:tx.adjustBizDay===true?'prev':(tx.adjustBizDay||''),
      category:tx.category||'その他'}));
    setShowSugs(false);
  }

  function getOccurrences(f,maxN){
    if(!f.startDate) return [];
    const base=sod(parseISO(f.startDate));
    const today2=todayD();
    const cap=f.endDate?new Date(Math.min(sod(parseISO(f.endDate)).getTime(),addMonths(today2,24).getTime())):addMonths(today2,24);
    const max=maxN||(f.frequency==='daily'?31:f.frequency==='weekly'?16:f.frequency==='yearly'?5:13);
    const res=[];
    for(let n=0;n<1500&&res.length<max;n++){
      let cur;
      if(f.frequency==='daily') cur=addDays(base,n);
      else if(f.frequency==='weekly') cur=addDays(base,n*7);
      else if(f.frequency==='monthly') cur=addMonths(base,n);
      else if(f.frequency==='yearly') cur=addMonths(base,n*12);
      else break;
      cur=sod(cur);
      if(isAfter(cur,cap)) break;
      const biz=f.adjustBizDay;
      const adj=biz==='prev'||biz===true?sod(prevBizDay(cur)):biz==='next'?sod(nextBizDay(cur)):cur;
      if(!isBefore(adj,today2)) res.push(fmt(adj));
    }
    return res;
  }

  function submit(e){
    e.preventDefault();
    if(!form.label.trim()){setErr('名前を入力してください');return;}
    const parsedAmt=parseJpAmt(form.amount);
    if(!parsedAmt||parsedAmt<=0){setErr('金額を入力してください');return;}
    if(form.type==='transfer'){
      if(!form.fromAccountId||!form.toAccountId){setErr('振替元・振替先の口座を選択してください');return;}
      if(form.fromAccountId===form.toAccountId){setErr('振替元と振替先は別の口座を選択してください');return;}
    } else {
      if(!form.accountId){setErr('口座を選択してください');return;}
    }
    setErr('');
    const tx={...form,amount:parsedAmt,endDate:form.endDate||null};
    if(editId){
      onChange(txs.map(t=>t.id===editId?{...tx,id:editId}:t));
      setEditId(null);
      addToast&&addToast('取引を更新しました');
    } else {
      onChange([...txs,{...tx,id:genId()}]);
      addToast&&addToast('取引を追加しました');
    }
    setForm({...DEF,accountId:form.accountId});
    setShowForm(false);
  }

  function confirmDelete(tx){ setConfirmTarget(tx); }
  function doDelete(){
    if(!confirmTarget) return;
    onChange(txs.filter(t=>t.id!==confirmTarget.id));
    addToast&&addToast(`「${confirmTarget.label}」を削除しました`);
    setConfirmTarget(null);
  }

  function startEdit(tx){ setEditId(tx.id); setForm({label:tx.label,type:tx.type,amount:String(tx.amount),category:tx.category||'その他',accountId:tx.accountId||'',fromAccountId:tx.fromAccountId||'',toAccountId:tx.toAccountId||'',overrides:tx.overrides||{},recurring:tx.recurring,frequency:tx.frequency||'monthly',startDate:tx.startDate,endDate:tx.endDate||'',adjustBizDay:tx.adjustBizDay===true?'prev':(tx.adjustBizDay||'')}); setShowForm(true); }
  function cancel(){ setEditId(null); setForm(DEF); setErr(''); setShowForm(false); }
  function openAddForm(){ setEditId(null); setForm(DEF); setErr(''); setShowForm(true); }

  const dateCls='border border-gray-300 dark:border-gray-600 rounded-lg px-2 py-1.5 text-sm flex-1 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-1 focus:ring-indigo-400';

  const accMap2=Object.fromEntries(accounts.map(a=>[a.id,a]));
  const filteredTxs=useMemo(()=>{
    return txs.filter(tx=>{
      if(filterType!=='all'&&tx.type!==filterType) return false;
      if(searchText.trim()&&!tx.label.toLowerCase().includes(searchText.trim().toLowerCase())) return false;
      return true;
    });
  },[txs,filterType,searchText]);

  return h('div',{className:'space-y-6'},
    confirmTarget&&h(ConfirmDialog,{
      title:'取引を削除',
      message:`「${confirmTarget.label}」を削除しますか？この操作は取り消せません。`,
      onConfirm:doDelete,
      onCancel:()=>setConfirmTarget(null)
    }),
    showForm&&h('div',{className:'fixed inset-0 bg-black/60 dark:bg-black/80 flex items-center justify-center z-[300] px-4',onClick:e=>{if(e.target===e.currentTarget)cancel();}},

// ─── Balance Table ────────────────────────────────────
function BalanceTable({ accounts, fData, txEventMap, onCellClick, onSkip, onEditTx, hiddenAccIds }){
  if(!accounts.length) return null;
  const [viewMode,setViewMode]=useState('daily');
  const cols=useMemo(()=>{
    if(viewMode==='daily') return fData;
    if(viewMode==='weekly') return fData.filter((_,i)=>i%7===0||i===fData.length-1);
    if(viewMode==='monthly'){
      const seen=new Set(); const res=[];
      for(let i=fData.length-1;i>=0;i--){
        const m=fData[i].date.slice(0,7);
        if(!seen.has(m)){seen.add(m);res.unshift(fData[i]);}
      }
      return res;
    }
    return fData;
  },[fData,viewMode]);
  const fmtCol=s=>{
    const [y,mo,d]=s.split('-');
    const dt=new Date(Number(y),Number(mo)-1,Number(d));
    const m=mo.startsWith('0')?mo.slice(1):mo;
    if(viewMode==='monthly') return `${y}/${m}`;
    return `${m}/${d}(${DOW[dt.getDay()]})`;
  };
  const fmtYen=v=>Math.abs(v).toLocaleString();
  const [tip,setTip]=useState(null);
  const tipTimer=useRef(null);
  const clearTipTimer=()=>{if(tipTimer.current){clearTimeout(tipTimer.current);tipTimer.current=null;}};
  const startTipClose=()=>{tipTimer.current=setTimeout(()=>setTip(null),200);};
  const editTxFromTip=txId=>{
    if(!txId||!onEditTx) return;
    setTip(null);
    onEditTx(txId);
  };
  const isTouch=useMemo(()=>{
    if(typeof window==='undefined') return false;
    const mqlNoHover=window.matchMedia&&window.matchMedia('(hover: none)').matches;
    const maxTouch=(navigator.maxTouchPoints||0)>0;
    return !!(mqlNoHover||maxTouch);
  },[]);
  const openTipForCell=(el,evs,date,accountId)=>{
    if(!evs||!evs.length) return;
    const r=el.getBoundingClientRect();
    const vw=window.innerWidth, vh=window.innerHeight;
    const tipW=Math.min(260, vw-16);
    const estH=44+evs.length*22;
    let x=Math.round(r.x+r.width/2-tipW/2);
    x=Math.max(8,Math.min(vw-tipW-8,x));
    let y=r.y-estH-8;
    if(y<8) y=Math.min(vh-estH-8, r.y+r.height+8);

  return h('div',{className:cardCls+' overflow-hidden'},

        onCellClick&&h('p',{className:'text-xs text-gray-400 dark:text-gray-500 hidden sm:block'},'セルをクリックして追加・明細から編集'),
        h('div',{className:'flex gap-1'},

            h('th',{className:'text-left px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400 whitespace-nowrap border-b border-r border-gray-200 dark:border-gray-700 sticky left-0 bg-gray-50 dark:bg-gray-900 z-10'},'口座'),
            cols.map(col=>

            cols.map((col,ci)=>{

    )
  );
}

// ─── Transaction Details ──────────────────────────────
const TX_PAGE=20;
function TxDetails({ txs, endD, startD, isPast, accounts, skippedKeys, skippedOccurrences, onSkip, onRestore, onEditTx, onDeleteTx }){
  const [page,setPage]=useState(0);
  const [showSkipped,setShowSkipped]=useState(false);
  const [deleteTarget,setDeleteTarget]=useState(null);
  const [search,setSearch]=useState('');
  const [typeFilter,setTypeFilter]=useState('all');
  const accMap=useMemo(()=>Object.fromEntries(accounts.map(a=>[a.id,a])),[accounts]);
  const txMap=useMemo(()=>Object.fromEntries(txs.map(t=>[t.id,t])),[txs]);
  const list=useMemo(()=>{
    if(!txs.length||!accounts.length) return [];
    if(isPast) return buildPastTxList(txs,startD,skippedKeys);
    return buildTxList(txs,endD,skippedKeys);
  },[txs,endD,startD,isPast,accounts,skippedKeys]);

  const filteredList=useMemo(()=>{
    if(!search.trim()&&typeFilter==='all') return list;
    return list.filter(ev=>{
      if(typeFilter!=='all'&&ev.type!==typeFilter) return false;
      if(search.trim()&&!ev.label.toLowerCase().includes(search.trim().toLowerCase())) return false;
      return true;
    });
  },[list,search,typeFilter]);

  if(!accounts.length) return null;
  const shown=(page+1)*TX_PAGE;
  const skippedCount=(skippedOccurrences||[]).length;

  return h('div',{className:cardCls},
    deleteTarget&&h(ConfirmDialog,{
      title:'取引を削除',
      message:deleteTarget.recurring
        ?`定期取引「${deleteTarget.label}」を削除しますか？取引管理からも削除され、全ての予定が消えます。`
        :`「${deleteTarget.label}」を削除しますか？この操作は取り消せません。`,
      onConfirm:()=>{ onDeleteTx&&onDeleteTx(deleteTarget.txId); setDeleteTarget(null); },
      onCancel:()=>setDeleteTarget(null)
    }),
    h('div',{className:'px-5 py-4 border-b border-gray-100 dark:border-gray-700'},
      h('span',{className:'text-base font-semibold text-gray-700 dark:text-gray-300 flex items-center gap-2 flex-wrap'},
        isPast?'過去の取引':'予定明細',
        list.length>0&&h('span',{className:'text-xs font-normal text-gray-400 dark:text-gray-500 bg-gray-100 dark:bg-gray-700 px-2 py-0.5 rounded-full'},
          (search.trim()||typeFilter!=='all')?`${filteredList.length}/${list.length}件`:`${list.length}件`),
        skippedCount>0&&h('span',{className:'text-xs font-normal text-orange-400 bg-orange-50 dark:bg-orange-900/20 px-2 py-0.5 rounded-full'},`${skippedCount}件スキップ中`)
      )
    ),
    list.length>0&&h('div',{className:'px-4 py-2 border-b border-gray-100 dark:border-gray-700 flex flex-wrap items-center gap-2'},
      h('div',{className:'relative flex-1 min-w-32'},
        h('svg',{className:'absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-400',fill:'none',stroke:'currentColor',viewBox:'0 0 24 24'},
          h('path',{strokeLinecap:'round',strokeLinejoin:'round',strokeWidth:2,d:'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z'})),
        h('input',{
          className:'w-full border border-gray-200 dark:border-gray-600 rounded-lg pl-8 pr-3 py-1.5 text-xs bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-indigo-400',
          placeholder:'取引名を検索…',value:search,onChange:e=>{setSearch(e.target.value);setPage(0);}
        })
      ),
      h('select',{
        className:'border border-gray-200 dark:border-gray-600 rounded-lg px-2 py-1.5 text-xs bg-white dark:bg-gray-700 text-gray-700 dark:text-gray-200 focus:outline-none focus:ring-1 focus:ring-indigo-400',
        value:typeFilter,onChange:e=>{setTypeFilter(e.target.value);setPage(0);}
      },
        h('option',{value:'all'},'全種別'),
        h('option',{value:'income'},'収入'),
        h('option',{value:'expense'},'支出'),
        h('option',{value:'transfer'},'振替')
      ),
      (search.trim()||typeFilter!=='all')&&h('button',{
        onClick:()=>{setSearch('');setTypeFilter('all');setPage(0);},
        className:'text-xs text-indigo-600 dark:text-indigo-400 hover:underline whitespace-nowrap'
      },'リセット')
    ),
    filteredList.length===0&&list.length>0
      ?h('div',{className:'text-center py-8 text-gray-400 dark:text-gray-500 text-sm'},'条件に一致する取引はありません')
      :null,
    list.length===0
      ?h('div',{className:'text-center py-8 text-gray-400 dark:text-gray-500 text-sm'},isPast?'この期間に記録された取引はありません':'この期間に予定された取引はありません')
        :h('div',null,
            h('div',{className:'overflow-x-auto'},
              h('table',{className:'w-full text-sm'},
                h('thead',{className:'bg-gray-50 dark:bg-gray-900/60 text-gray-500 dark:text-gray-400 text-xs uppercase tracking-wider'},
                  h('tr',null,
                    ['日付','名前','カテゴリ','口座','金額',''].map((col,i)=>
                      h('th',{key:i,className:`px-4 py-3 font-medium ${i===4?'text-right':'text-left'}`},col))
                  )
                ),
                h('tbody',{className:'divide-y divide-gray-100 dark:divide-gray-700'},
                  filteredList.slice(0,shown).map((ev,i)=>{
                    const acc=accMap[ev.accountId];
                    const fromAcc=accMap[ev.fromAccountId];
                    const toAcc=accMap[ev.toAccountId];
                    const isIncome=ev.type==='income';
                    const isTransfer=ev.type==='transfer';
                    return h('tr',{key:i,className:'hover:bg-gray-50 dark:hover:bg-gray-700/40 transition-colors'},
                      h('td',{className:'px-4 py-2.5 text-gray-500 dark:text-gray-400 whitespace-nowrap text-xs'},fmtDisp(ev.date)),
                      h('td',{className:'px-4 py-2.5 font-medium text-gray-800 dark:text-gray-200'},
                        ev.label,
                        ev.recurring&&h('span',{className:'ml-1 text-xs text-gray-400 dark:text-gray-500 font-normal'},'定期')
                      ),
                      h('td',{className:'px-4 py-2.5 text-gray-500 dark:text-gray-400 text-xs'},ev.category||'—'),
                      h('td',{className:'px-4 py-2.5'},
                        isTransfer
                          ?h('span',{className:'flex items-center gap-1 flex-wrap text-xs'},
                              fromAcc&&h('span',{className:'flex items-center gap-1'},
                                h('span',{className:'w-2 h-2 rounded-full flex-shrink-0',style:{backgroundColor:fromAcc.color}}),
                                h('span',{className:'text-gray-600 dark:text-gray-400'},fromAcc.name)),
                              h('span',{className:'text-gray-400 mx-0.5'},'→'),
                              toAcc&&h('span',{className:'flex items-center gap-1'},
                                h('span',{className:'w-2 h-2 rounded-full flex-shrink-0',style:{backgroundColor:toAcc.color}}),
                                h('span',{className:'text-gray-600 dark:text-gray-400'},toAcc.name)))
                          :acc
                            ?h('span',{className:'flex items-center gap-1 text-xs text-gray-600 dark:text-gray-400'},
                                h('span',{className:'w-2 h-2 rounded-full flex-shrink-0',style:{backgroundColor:acc.color}}),
                                acc.name)
                            :h('span',{className:'text-gray-400'},'—')
                      ),
                      h('td',{className:`px-4 py-2.5 text-right font-semibold whitespace-nowrap ${isIncome?'text-emerald-600 dark:text-emerald-400':isTransfer?'text-purple-600 dark:text-purple-400':'text-red-600 dark:text-red-400'}`},
                        `${isIncome?'+':isTransfer?'':'-'}¥${ev.amount.toLocaleString()}`),
                      h('td',{className:'px-4 py-2.5 text-center'},
                        h('div',{className:'flex items-center justify-center gap-2'},
                          ev.txId&&onEditTx&&h('button',{
                            onClick:()=>onEditTx(ev.txId),
                            className:'text-xs text-gray-300 dark:text-gray-600 hover:text-indigo-400 dark:hover:text-indigo-400 transition-colors',
                            title:'この取引を編集'
                          },'編集'),
                          ev.txId&&ev.recurring&&onSkip&&h('button',{
                            onClick:()=>onSkip(`${ev.txId}_${ev.date}`),
                            className:'text-xs text-gray-300 dark:text-gray-600 hover:text-orange-400 dark:hover:text-orange-400 transition-colors',
                            title:'この回だけ残高推移から除外（取引管理には残ります）'
                          },'スキップ'),
                          ev.txId&&h('button',{
                            onClick:()=>setDeleteTarget(ev),
                            className:'text-xs text-gray-300 dark:text-gray-600 hover:text-red-400 dark:hover:text-red-400 transition-colors',
                            title:ev.recurring?'定期取引を取引管理から削除':'取引を削除'
                          },'削除')
                        )
                      )
                    );
                  })
                )
              )
            ),
            filteredList.length>shown&&h('div',{className:'px-5 py-3 border-t border-gray-100 dark:border-gray-700 text-center'},
              h('button',{onClick:()=>setPage(p=>p+1),className:'text-sm text-indigo-600 dark:text-indigo-400 hover:underline font-medium'},
                `もっと見る（残り ${filteredList.length-shown} 件）`)
            ),
            skippedCount>0&&h('div',{className:'border-t border-gray-100 dark:border-gray-700 px-5 py-3'},
              h('button',{onClick:()=>setShowSkipped(v=>!v),className:'text-xs text-orange-500 dark:text-orange-400 hover:underline'},
                showSkipped?`▲ スキップ済みを隠す`:`▼ スキップ済み ${skippedCount}件を表示`
              ),
              showSkipped&&h('div',{className:'mt-2 space-y-1'},
                (skippedOccurrences||[]).map(key=>{
                  const sep=key.indexOf('_');
                  const txId=key.slice(0,sep);
                  const date=key.slice(sep+1);
                  const tx=txMap[txId];
                  return h('div',{key,className:'flex items-center justify-between text-xs text-gray-400 dark:text-gray-500 bg-gray-50 dark:bg-gray-800/60 rounded px-3 py-1.5'},
                    h('span',null,
                      h('span',{className:'text-gray-500 dark:text-gray-400'},fmtDisp(date)),
                      h('span',{className:'mx-2'},'—'),
                      tx?tx.label:txId
                    ),
                    onRestore&&h('button',{onClick:()=>onRestore(key),className:'text-indigo-400 hover:text-indigo-600 dark:hover:text-indigo-300 hover:underline ml-4'},'復元')
                  );
                })
              )
            )
          )
  );
}

// ─── Add Transaction Modal ────────────────────────────
function AddTxModal({ date, accounts, dark, onSave, onClose, initAccountId, editTx }){
  const firstId=accounts[0]?.id||'';
  const secondId=accounts[1]?.id||firstId;
  const [form,setForm]=useState(()=>{
    const seed=editTx||{};
    return {
      label:seed.label||'',type:seed.type||'expense',amount:seed.amount?String(seed.amount):'',category:seed.category||'その他',
      accountId:seed.accountId||initAccountId||firstId,fromAccountId:seed.fromAccountId||initAccountId||firstId,toAccountId:seed.toAccountId||secondId,
      recurring:editTx?!!editTx.recurring:false,frequency:editTx?.frequency||'monthly',startDate:editTx?.startDate||date,endDate:editTx?.endDate||''
    };
  });
  const [err,setErr]=useState('');
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));
  const isTransfer=form.type==='transfer';
  useEffect(()=>{const onKey=e=>{if(e.key==='Escape')onClose();};document.addEventListener('keydown',onKey);return()=>document.removeEventListener('keydown',onKey);},[onClose]);
  function submit(e){
    e.preventDefault();
    if(!isTransfer&&!form.label.trim()){setErr('名前を入力してください');return;}
    const amt=parseJpAmt(form.amount);
    if(!amt||amt<=0){setErr('金額を入力してください');return;}
    if(isTransfer){
      if(!form.fromAccountId||!form.toAccountId){setErr('振替元・振替先の口座を選択してください');return;}
      if(form.fromAccountId===form.toAccountId){setErr('振替元と振替先は別の口座を選択してください');return;}
      onSave({id:editTx?.id||genId(),label:'資金振替',type:'transfer',amount:amt,category:'',accountId:'',fromAccountId:form.fromAccountId,toAccountId:form.toAccountId,recurring:form.recurring,frequency:form.frequency,startDate:form.startDate||date,endDate:form.endDate||null,overrides:editTx?.overrides||{},adjustBizDay:editTx?.adjustBizDay||''});
    } else {
      if(!form.accountId){setErr('口座を選択してください');return;}
      onSave({id:editTx?.id||genId(),label:form.label.trim(),type:form.type,amount:amt,category:form.category,accountId:form.accountId,fromAccountId:'',toAccountId:'',recurring:form.recurring,frequency:form.frequency,startDate:form.startDate||date,endDate:form.endDate||null,overrides:editTx?.overrides||{},adjustBizDay:editTx?.adjustBizDay||''});
    }
  }
  const inp=`w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 ${dark?'bg-gray-800 border-gray-600 text-gray-100':'bg-white border-gray-300 text-gray-900'}`;
  const lbl='block text-xs text-gray-500 mb-1';
  return h('div',{className:'fixed inset-0 bg-black/50 flex items-center justify-center z-50 px-4',onClick:e=>{if(e.target===e.currentTarget)onClose();}},
    h('div',{role:'dialog','aria-modal':'true','aria-labelledby':'quick-add-title',className:`rounded-2xl shadow-xl w-full max-w-sm p-5 overflow-y-auto ${dark?'bg-gray-900':'bg-white'}`,style:{maxHeight:'90vh'}},
      h('div',{className:'flex items-center justify-between mb-4'},
        h('h3',{id:'quick-add-title',className:`text-base font-semibold ${dark?'text-gray-100':'text-gray-800'}`},editTx?'取引を編集':'取引を追加'),
        h('button',{onClick:onClose,'aria-label':'取引追加を閉じる',className:'text-gray-400 hover:text-gray-600 text-xl leading-none'},'✕')
      ),
      h('form',{onSubmit:submit,className:'space-y-3'},
        !isTransfer&&h('div',null,
          h('label',{htmlFor:'quick-label',className:lbl},'名前 *'),
          h('input',{id:'quick-label',autoFocus:true,className:inp,placeholder:'例: 食費、給与、口座振替',value:form.label,onChange:e=>sf('label',e.target.value)})

// ─── Monthly breakdown card (実績 / 予測 を1枚に集約) ───
function netCls(n){ return n>=0?'text-emerald-600 dark:text-emerald-400':'text-rose-500 dark:text-rose-400'; }
function fmtSigned(n){ return `${n>=0?'+':'−'}¥${Math.abs(n).toLocaleString()}`; }

function MonthBreakdownCard({ actual, forecast }){
  const [open,setOpen]=useState(false);
  const [view,setView]=useState('actual'); // 'actual' | 'forecast'
  const hasAny=actual.incomeItems.length||actual.expenseItems.length||forecast.incomeItems.length||forecast.expenseItems.length;
  if(!hasAny) return null;

  const aNet=actual.incTotal-actual.expTotal;
  const fNet=forecast.incTotal-forecast.expTotal;
  const data=view==='actual'?actual:forecast;
  const emptyInc=view==='actual'?'今月の収入はまだありません':'今月の収入予定はありません';
  const emptyExp=view==='actual'?'今月の支出はまだありません':'今月の支出予定はありません';

  const renderTable=(items, total, isIncome)=>{
    const colorCls=isIncome?'text-emerald-600 dark:text-emerald-400':'text-rose-500 dark:text-rose-400';
    const sign=isIncome?'+':'-';
    return h('div',null,
      h('h3',{className:`text-xs font-semibold ${colorCls} uppercase tracking-widest mb-3`},isIncome?'収入':'支出'),
      items.length===0
        ?h('p',{className:'text-xs text-gray-400 dark:text-gray-500 py-4'},isIncome?emptyInc:emptyExp)
        :h('table',{className:'w-full text-sm'},
          h('thead',{className:'text-gray-400 dark:text-gray-500 text-xs'},
            h('tr',{className:'border-b border-gray-100 dark:border-gray-700/60'},
              h('th',{className:'text-left py-2 font-medium'},'名前'),
              h('th',{className:'text-right py-2 font-medium'},'金額')
            )
          ),
          h('tbody',{className:'divide-y divide-gray-100 dark:divide-gray-700/60'},
            items.map((it,i)=>{
              return h('tr',{key:i,className:'hover:bg-gray-50 dark:hover:bg-gray-700/30'},
                h('td',{className:'py-2'},
                  h('div',{className:'font-medium text-gray-800 dark:text-gray-200'},it.label),
                  it.count>1&&h('div',{className:'text-xs text-gray-400 dark:text-gray-500'},`${it.count}回`)
                ),
                h('td',{className:`py-2 text-right font-semibold ${colorCls} whitespace-nowrap tabular-nums`},`${sign}¥${it.total.toLocaleString()}`)
              );
            }),
            h('tr',{className:'font-semibold'},
              h('td',{className:'pt-3 text-gray-700 dark:text-gray-300'},'合計'),
              h('td',{className:`pt-3 text-right ${colorCls} whitespace-nowrap tabular-nums`},`${sign}¥${total.toLocaleString()}`)
            )
          )
        )
    );
  };

  const figure=(label,labelCls,n)=>h('div',{className:'text-right leading-tight'},
    h('div',{className:`text-[10px] font-bold uppercase tracking-wider ${labelCls}`},label),
    h('div',{className:`text-sm font-bold tabular-nums ${netCls(n)}`},fmtSigned(n))
  );

  return h('div',{className:cardCls+' overflow-hidden'},
    h('button',{onClick:()=>setOpen(v=>!v),className:'w-full flex items-center justify-between px-5 py-4 text-left hover:bg-gray-50 dark:hover:bg-gray-700/40 transition-colors gap-3'},
      h('span',{className:'text-sm font-semibold text-gray-700 dark:text-gray-200 flex-shrink-0'},'今月の収支'),
      h('div',{className:'flex items-center gap-5 ml-auto'},
        figure('実績','text-gray-400 dark:text-gray-500',aNet),
        figure('予測','text-indigo-400 dark:text-indigo-300',fNet),
        h('span',{className:'text-gray-400 dark:text-gray-500 text-xs flex-shrink-0'},open?'▲':'▼')
      )
    ),
    open&&h('div',{className:'border-t border-gray-100 dark:border-gray-700/60'},
      h('div',{className:'flex items-center gap-2 px-5 pt-4 flex-wrap'},
        [['actual','実績',actual.periodLabel],['forecast','予測',forecast.periodLabel]].map(([v,label,range])=>
          h('button',{key:v,onClick:()=>setView(v),
            className:`px-3 py-1.5 rounded-full text-xs font-semibold transition-colors ${view===v?(v==='actual'?'bg-gray-900 dark:bg-white text-white dark:text-gray-900':'bg-indigo-600 text-white'):'text-gray-500 dark:text-gray-400 border border-gray-200 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700'}`},
            `${label} ${range}`))
      ),
      view==='forecast'&&h('p',{className:'px-5 pt-2 text-xs text-gray-400 dark:text-gray-500'},'登録済みの定期取引と予定（単発）から、今月末までの収支を予測した金額です。'),
      h('div',{className:'px-5 pb-5 pt-4 grid grid-cols-2 gap-4 sm:gap-6'},
        renderTable(data.incomeItems,data.incTotal,true),
        renderTable(data.expenseItems,data.expTotal,false)
      )
    )
  );
}

// ─── Dashboard ───────────────────────────────────────
function Dashboard({ accounts, txs, dark, onAddTx, onUpdAcc, onUpdTx, onNavigate, skippedOccurrences, onSkip, onRestore, onDeleteTx }){
  const [pIdx,setPIdx]=useState(4);
  const [addDate,setAddDate]=useState(null);
  const [addAccId,setAddAccId]=useState(null);
  const [editTxId,setEditTxId]=useState(null);
  const [editAccId,setEditAccId]=useState(null);
  const [editBal,setEditBal]=useState('');
  const [fabOpen,setFabOpen]=useState(false);
  const [hiddenAccIds,setHiddenAccIds]=useState(new Set());
  function toggleAccId(id){ setHiddenAccIds(prev=>{ const n=new Set(prev); n.has(id)?n.delete(id):n.add(id); return n; }); }
  const isPast=PERIODS[pIdx].months<0;
  const skippedKeys=useMemo(()=>new Set(skippedOccurrences||[]),[skippedOccurrences]);
  const {startD,endD}=useMemo(()=>{
    const t=todayD();
    if(isPast) return {startD:addMonths(t,PERIODS[pIdx].months),endD:t};
    return {startD:t,endD:addMonths(t,PERIODS[pIdx].months)};
  },[pIdx,isPast]);
  const fullData=useMemo(()=>{
    if(!accounts.length) return [];
    if(isPast) return buildHistoricalForecast(accounts,txs,startD,skippedKeys);
    return buildForecast(accounts,txs,endD,skippedKeys);
  },[accounts,txs,startD,endD,isPast,skippedKeys]);
  const fData=useMemo(()=>{
    const absMons=Math.abs(PERIODS[pIdx].months);
    const step=absMons<=1?1:absMons<=3?3:7;
    return fullData.filter((_,i)=>i%step===0);
  },[fullData,pIdx]);
  const riskData=useMemo(()=>accounts.length?buildForecast(accounts,txs,addMonths(todayD(),12),skippedKeys):[],[accounts,txs,skippedKeys]);
  const shortfalls=useMemo(()=>findShortfalls(accounts,riskData),[accounts,riskData]);
  const txEventMap=useMemo(()=>{
    if(isPast) return {};
    const map={};
    const today=todayD();
    const add=(ds,aid,label,amt,txId,recurring)=>{if(!map[ds])map[ds]={};if(!map[ds][aid])map[ds][aid]=[];map[ds][aid].push({label,amt,txId,recurring});};
    txs.forEach(tx=>{
      if(tx.recurring){
        if(tx.type==='transfer'){
          expandRec(tx,today,endD,skippedKeys).forEach(e=>{const ds=fmt(e.date);add(ds,tx.fromAccountId,tx.label,-e.amt,tx.id,true);add(ds,tx.toAccountId,tx.label,e.amt,tx.id,true);});
        } else {
          expandRec(tx,today,endD,skippedKeys).forEach(e=>add(fmt(e.date),tx.accountId,tx.label,e.amt,tx.id,true));
        }
      } else if(tx.startDate){
        const d=sod(parseISO(tx.startDate));
        const ds=fmt(d);
        if(!isBefore(d,today)&&!isAfter(d,endD)&&!skippedKeys.has(`${tx.id}_${ds}`)){
          if(tx.type==='transfer'){add(ds,tx.fromAccountId,tx.label,-tx.amount,tx.id,false);add(ds,tx.toAccountId,tx.label,tx.amount,tx.id,false);}
          else add(ds,tx.accountId,tx.label,tx.type==='income'?tx.amount:-tx.amount,tx.id,false);
        }
      }
    });
    return map;
  },[txs,endD,isPast,skippedKeys]);

  const totalBal=accounts.reduce((s,a)=>s+a.balance,0);
  const monthly=useMemo(()=>{
    let inc=0,exp=0;
    txs.filter(tx=>tx.recurring&&tx.type!=='transfer').forEach(tx=>{
      const m=tx.frequency==='monthly'?1:tx.frequency==='yearly'?1/12:tx.frequency==='weekly'?4:30;
      if(tx.type==='income') inc+=Math.round(tx.amount*m);
      else exp+=Math.round(tx.amount*m);
    });
    return {inc,exp};
  },[txs]);

  // 今月の実績（月初〜今日）
  const actualBreakdown=useMemo(()=>{
    const t=todayD();
    const monthStart=sod(new Date(t.getFullYear(),t.getMonth(),1));
    const periodLabel=`${t.getMonth()+1}/1〜${t.getMonth()+1}/${t.getDate()}`;
    return {periodLabel,...computeBreakdown(txs,monthStart,t,skippedKeys)};
  },[txs,skippedKeys]);

  // 今月の予測（月初〜月末）— 定期取引と予定（単発）から1ヶ月まるごとを見積もる
  const monthForecast=useMemo(()=>{
    const t=todayD();
    const monthStart=sod(new Date(t.getFullYear(),t.getMonth(),1));
    const monthEnd=sod(new Date(t.getFullYear(),t.getMonth()+1,0));
    const m=t.getMonth()+1;
    const periodLabel=`${m}/1〜${m}/${monthEnd.getDate()}`;
    return {periodLabel,...computeBreakdown(txs,monthStart,monthEnd,skippedKeys)};
  },[txs,skippedKeys]);

  const net=monthly.inc-monthly.exp;
  const editTx=editTxId?txs.find(t=>t.id===editTxId):null;

  return h('div',{className:'space-y-5'},
    addDate&&onAddTx&&h(AddTxModal,{date:addDate,accounts,dark,initAccountId:addAccId,onClose:()=>{setAddDate(null);setAddAccId(null);},onSave:tx=>{onAddTx(tx);setAddDate(null);setAddAccId(null);}}),
    editTx&&onUpdTx&&h(AddTxModal,{date:editTx.startDate||todayStr(),accounts,dark,editTx,onClose:()=>setEditTxId(null),onSave:tx=>{onUpdTx(tx);setEditTxId(null);}}),
    h('section',{className:'relative overflow-hidden rounded-3xl bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 text-white p-5 sm:p-7 shadow-[0_18px_45px_rgba(15,23,42,0.18)] dark:shadow-none'},
      h('div',{className:'absolute -top-24 -right-16 w-72 h-72 rounded-full bg-indigo-500/20 blur-3xl','aria-hidden':'true'}),
      h('div',{className:'absolute -bottom-32 left-1/3 w-64 h-64 rounded-full bg-violet-500/10 blur-3xl','aria-hidden':'true'}),
      h('div',{className:'relative grid lg:grid-cols-[1.25fr_1fr] gap-6 lg:gap-10 items-stretch'},
        h('div',{className:'flex flex-col justify-between min-w-0'},
          h('div',null,
            h('div',{className:'flex items-center gap-2 mb-3'},
              h('span',{className:'w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_0_4px_rgba(52,211,153,0.12)]'}),
              h('p',{className:'text-[11px] font-semibold text-slate-300 uppercase tracking-[0.18em]'},'現在の総資産')
            ),
            h('p',{className:'text-[2.55rem] sm:text-5xl font-bold tabular-nums tracking-[-0.04em] leading-none break-words'},`${totalBal<0?'-':''}¥${Math.abs(totalBal).toLocaleString()}`),
            h('p',{className:'text-xs text-slate-400 mt-3'},`${accounts.length}口座の合計 ・ ${fmtDisp(todayStr())}`)
          ),
          h('div',{className:'flex items-center gap-2 mt-6 flex-wrap'},
            onAddTx&&h('button',{onClick:()=>setAddDate(todayStr()),className:'inline-flex items-center gap-2 rounded-xl bg-white text-slate-900 px-4 py-2.5 text-sm font-semibold shadow-sm hover:bg-indigo-50 transition-colors'},
              h('span',{className:'text-lg leading-none text-indigo-600'},'+'),
              '取引を追加'
            ),
            onNavigate&&h('button',{onClick:()=>onNavigate('accounts'),className:'rounded-xl border border-white/15 bg-white/5 px-4 py-2.5 text-sm font-semibold text-slate-200 hover:bg-white/10 transition-colors'},'口座を管理')
          )
        ),
        h('div',{className:'rounded-2xl border border-white/10 bg-white/[0.07] backdrop-blur-sm p-4 sm:p-5'},
          h('div',{className:'flex items-start justify-between gap-3 pb-4 border-b border-white/10'},
            h('div',null,
              h('p',{className:'text-[11px] font-semibold text-slate-400 uppercase tracking-widest'},'定期収支 / 月'),
              h('p',{className:`text-2xl sm:text-3xl font-bold tabular-nums mt-1 ${net>=0?'text-emerald-300':'text-rose-300'}`},`${net>=0?'+':'-'}¥${Math.abs(net).toLocaleString()}`)
            ),
            h('span',{className:`rounded-full px-2.5 py-1 text-[11px] font-semibold ${net>=0?'bg-emerald-400/15 text-emerald-300':'bg-rose-400/15 text-rose-300'}`},net>=0?'黒字':'赤字')
          ),
          h('div',{className:'grid grid-cols-2 gap-3 pt-4'},
            h('div',{className:'rounded-xl bg-black/10 px-3 py-3'},
              h('p',{className:'text-[10px] font-semibold text-slate-400 uppercase tracking-wider'},'収入'),
              h('p',{className:'text-base sm:text-lg font-bold text-emerald-300 tabular-nums mt-1 break-all'},`+¥${monthly.inc.toLocaleString()}`)
            ),
            h('div',{className:'rounded-xl bg-black/10 px-3 py-3'},
              h('p',{className:'text-[10px] font-semibold text-slate-400 uppercase tracking-wider'},'支出'),
              h('p',{className:'text-base sm:text-lg font-bold text-rose-300 tabular-nums mt-1 break-all'},`-¥${monthly.exp.toLocaleString()}`)
            )
          )
        )
      ),
    ),
    shortfalls.length>0&&h('section',{className:'rounded-2xl border border-rose-200/80 dark:border-rose-800/70 bg-white dark:bg-gray-900 p-4 sm:p-5 shadow-[0_1px_8px_rgba(15,23,42,0.04)]','aria-labelledby':'shortfall-title'},
      h('div',{className:'flex items-start gap-3'},
        h('div',{className:'w-9 h-9 rounded-xl bg-rose-50 dark:bg-rose-900/40 text-rose-600 dark:text-rose-300 flex items-center justify-center flex-shrink-0 font-bold'},'!'),
        h('div',{className:'min-w-0 flex-1'},
          h('div',{className:'flex items-center justify-between gap-2 mb-2'},

              h('h2',{id:'shortfall-title',className:'font-semibold text-gray-900 dark:text-gray-100'},'資金不足の予測'),
              h('p',{className:'text-xs text-gray-400 dark:text-gray-500 mt-0.5'},'登録済みの取引から見込まれる最初の不足')
            ),
            h('span',{className:'rounded-full bg-rose-50 dark:bg-rose-900/30 px-2.5 py-1 text-[11px] font-semibold text-rose-600 dark:text-rose-300 whitespace-nowrap'},'今後12ヶ月')
          ),

// ─── Upcoming Payments ────────────────────────────────
function UpcomingPayments({txs,accounts,skippedKeys,onSkip,onDeleteTx}){
  const today=todayD();
  const end30=addDays(today,30);
  const [deleteTarget,setDeleteTarget]=useState(null);
  const accMap={};
  accounts.forEach(a=>{accMap[a.id]=a;});
  const events=[];
  txs.forEach(tx=>{
    if(tx.type==='transfer') return;
    if(tx.recurring){
      expandRec(tx,today,end30,skippedKeys).forEach(e=>{
        events.push({date:fmt(e.date),label:tx.label,amount:Math.abs(e.amt),type:tx.type,daysLeft:Math.round((e.date-today)/86400000),txId:tx.id,recurring:true});
      });
    } else {
      const d=sod(parseISO(tx.startDate));
      if(!isBefore(d,today)&&!isAfter(d,end30)){
        events.push({date:fmt(d),label:tx.label,amount:tx.amount,type:tx.type,daysLeft:Math.round((d-today)/86400000),txId:tx.id,recurring:false});
      }
    }
  });
  events.sort((a,b)=>a.date.localeCompare(b.date));
  if(!events.length) return null;
  return h('div',{className:cardCls+' p-5'},
    deleteTarget&&h(ConfirmDialog,{
      title:'取引を削除',
      message:deleteTarget.recurring
        ?`定期取引「${deleteTarget.label}」を削除しますか？取引管理からも削除され、全ての予定が消えます。`
        :`「${deleteTarget.label}」を削除しますか？この操作は取り消せません。`,
      onConfirm:()=>{ onDeleteTx&&onDeleteTx(deleteTarget.txId); setDeleteTarget(null); },
      onCancel:()=>setDeleteTarget(null)
    }),
    h('div',{className:'flex items-center gap-2.5 mb-4'},
      h('div',{className:'w-8 h-8 rounded-lg bg-amber-100 dark:bg-amber-900/50 flex items-center justify-center'},
        h('svg',{className:'w-4 h-4 text-amber-600 dark:text-amber-400',viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:'2'},
          h('rect',{x:'3',y:'4',width:'18',height:'18',rx:'2',ry:'2'}),
          h('line',{x1:'16',y1:'2',x2:'16',y2:'6'}),
          h('line',{x1:'8',y1:'2',x2:'8',y2:'6'}),
          h('line',{x1:'3',y1:'10',x2:'21',y2:'10'})
        )
      ),
      h('h2',{className:'text-base font-semibold text-gray-700 dark:text-gray-300'},'直近30日の予定'),
      h('span',{className:'ml-auto text-xs bg-amber-100 dark:bg-amber-900/40 text-amber-600 dark:text-amber-400 rounded-full px-2 py-0.5 font-medium'},`${events.length}件`)
    ),
    h('div',{className:'divide-y divide-gray-100 dark:divide-gray-700'},
      events.slice(0,6).map((ev,i)=>
        h('div',{key:i,className:'flex items-center gap-3 py-2.5'},
          h('div',{className:`w-11 text-center flex-shrink-0 rounded-lg py-1 ${ev.daysLeft===0?'bg-amber-100 dark:bg-amber-900/40':'bg-gray-50 dark:bg-gray-700/50'}`},
            h('div',{className:`text-base font-bold leading-none tabular-nums ${ev.daysLeft===0?'text-amber-600 dark:text-amber-400':'text-gray-600 dark:text-gray-300'}`},ev.daysLeft===0?'今日':ev.daysLeft),
            ev.daysLeft>0&&h('div',{className:'text-xs text-gray-400 dark:text-gray-500 mt-0.5'},'日後')
          ),
          h('div',{className:'flex-1 min-w-0'},
            h('p',{className:'text-sm font-medium text-gray-800 dark:text-gray-200 truncate'},ev.label),
            h('p',{className:'text-xs text-gray-400 dark:text-gray-500 mt-0.5'},ev.date.slice(5).replace('-','/'))
          ),
          h('div',{className:`text-sm font-bold tabular-nums ${ev.type==='income'?'text-emerald-600 dark:text-emerald-400':'text-rose-500 dark:text-rose-400'}`},
            `${ev.type==='income'?'+':'-'}¥${ev.amount.toLocaleString()}`),
          (onSkip||onDeleteTx)&&h('div',{className:'flex gap-1 flex-shrink-0'},

          h('p',{className:'text-xs text-gray-400 mb-3'},'口座・取引・予算・支払済み情報をまとめて保存できます。'),
          h('div',{className:'grid grid-cols-1 sm:grid-cols-3 gap-2'},
            h('button',{onClick:()=>downloadFullBackup({accounts,transactions:txs,budgets,skipped,preferences:prefs}),className:'border border-gray-200 dark:border-gray-600 rounded-xl px-3 py-2.5 text-xs font-semibold text-gray-600 dark:text-gray-300'},'JSONバックアップ'),
            h('label',{className:'text-center border border-gray-200 dark:border-gray-600 rounded-xl px-3 py-2.5 text-xs font-semibold text-gray-600 dark:text-gray-300 cursor-pointer'},'JSONを復元',h('input',{type:'file',accept:'.json,application/json',className:'sr-only',onChange:e=>readFile(e.target.files?.[0],text=>onRestore(JSON.parse(text)))})),
            h('label',{className:'text-center border border-gray-200 dark:border-gray-600 rounded-xl px-3 py-2.5 text-xs font-semibold text-gray-600 dark:text-gray-300 cursor-pointer'},'取引CSVを追加',h('input',{type:'file',accept:'.csv,text/csv',className:'sr-only',onChange:e=>readFile(e.target.files?.[0],text=>onCsvImport(text))}))
          )
        ),
        message&&h('p',{className:'text-sm text-indigo-600 dark:text-indigo-400',role:'status'},message)
      )
    )
  );
}

function AppNavigation({active,onChange}){
  const icons={
    home:[h('path',{key:'p1',d:'M3 10.5 12 3l9 7.5'}),h('path',{key:'p2',d:'M5 9.5V21h14V9.5'}),h('path',{key:'p3',d:'M9 21v-7h6v7'})],
    transactions:[h('path',{key:'p1',d:'M7 3v15'}),h('path',{key:'p2',d:'m3 14 4 4 4-4'}),h('path',{key:'p3',d:'M17 21V6'}),h('path',{key:'p4',d:'m13 10 4-4 4 4'})],
    accounts:[h('rect',{key:'p1',x:'3',y:'5',width:'18',height:'14',rx:'2'}),h('path',{key:'p2',d:'M3 10h18'}),h('path',{key:'p3',d:'M7 15h3'})],
    analysis:[h('path',{key:'p1',d:'M4 20V10'}),h('path',{key:'p2',d:'M10 20V4'}),h('path',{key:'p3',d:'M16 20v-7'}),h('path',{key:'p4',d:'M22 20H2'})]
  };
  const icon=id=>h('svg',{className:'w-[18px] h-[18px]',viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:'2',strokeLinecap:'round',strokeLinejoin:'round','aria-hidden':'true'},icons[id]);
  const items=[['home','ホーム'],['transactions','取引'],['accounts','口座'],['analysis','分析']];
  const buttons=items.map(([id,label])=>h('button',{key:id,onClick:()=>onChange(id),'aria-current':active===id?'page':undefined,className:`flex items-center justify-center gap-1.5 rounded-xl transition-all duration-200 ${active===id?'text-indigo-700 dark:text-indigo-300 bg-indigo-50 dark:bg-indigo-900/30 shadow-[inset_0_0_0_1px_rgba(99,102,241,0.08)]':'text-gray-400 dark:text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800/60'}`},icon(id),h('span',{className:'text-xs sm:text-sm font-semibold'},label)));
  return h(React.Fragment,null,
    h('nav',{className:'hidden md:grid grid-cols-4 gap-1 w-[22rem]','aria-label':'メインナビゲーション'},buttons),
    h('nav',{className:'md:hidden fixed bottom-0 inset-x-0 z-50 grid grid-cols-4 gap-1 bg-white/95 dark:bg-gray-900/95 backdrop-blur-xl border-t border-gray-100 dark:border-gray-800 px-2 pt-2 pb-[max(0.5rem,env(safe-area-inset-bottom))] shadow-[0_-4px_24px_rgba(15,23,42,0.08)]','aria-label':'メインナビゲーション'},buttons.map(b=>React.cloneElement(b,{className:b.props.className+' flex-col py-1.5'})))
  );
}


// ─── App ─────────────────────────────────────────────
const LS_DARK='cf_dark';
const LS_SKIPPED='cf_skipped';
function App(){
  const [accounts,setAccounts]=useState([]);
  const [txs,setTxs]=useState([]);
  const [budgets,setBudgets]=useState({});
  const [skippedOccurrences,setSkippedOccurrences]=useState([]);
  const [preferences,setPreferences]=useState(DEFAULT_PREFS);
  const [loading,setLoading]=useState(true);
  const [dark,setDark]=useState(()=>localStorage.getItem(LS_DARK)==='1');
  const [showSettings,setShowSettings]=useState(false);
  const [activeView,setActiveView]=useState('home');
  const [syncStatus,setSyncStatus]=useState({state:'saving',message:'データを読み込んでいます'});
  const [toasts,setToasts]=useState([]);
  const txSaveQueue=useRef(Promise.resolve());
  const retryRef=useRef(null);

  function addToast(message,type='success'){
    const id=Date.now()+Math.random();
    setToasts(prev=>[...prev,{id,message,type}]);
    setTimeout(()=>setToasts(prev=>prev.filter(t=>t.id!==id)),3500);
  }

  useEffect(()=>{
    let alive=true;
    async function hydrate(){
      setLoading(true);
      const cache=readLocalCache();
      try{
        const data=await loadAllData();
        if(!alive)return;
        const legacySkipped=(()=>{try{return JSON.parse(localStorage.getItem(LS_SKIPPED)||'[]');}catch{return [];}})();
        const a=data.accounts??cache.accounts??[];
        const t=data.transactions??cache.transactions??[];
        const b=data.budgets??cache.budgets??{};
        const s=data.skipped??cache.skipped??legacySkipped;
        const p={...DEFAULT_PREFS,...(data.preferences??cache.preferences??{})};
        setAccounts(a);setTxs(t);setBudgets(b);setSkippedOccurrences(s);setPreferences(p);
        DATA_KEYS.forEach(k=>writeLocalCache(k,{accounts:a,transactions:t,budgets:b,skipped:s,preferences:p}[k]));
        setSyncStatus({state:'synced',message:'クラウドと同期済み'});
      }catch(e){
        if(!alive)return;
        setAccounts(cache.accounts||[]);setTxs(cache.transactions||[]);setBudgets(cache.budgets||{});setSkippedOccurrences(cache.skipped||[]);setPreferences({...DEFAULT_PREFS,...(cache.preferences||{})});
        setSyncStatus({state:navigator.onLine?'error':'offline',message:`ローカルデータを表示中: ${e.message}`});
      }finally{if(alive)setLoading(false);}
    }
    hydrate();
    return()=>{alive=false;};
  },[]);

  useEffect(()=>{
    if(dark){ document.documentElement.classList.add('dark'); }
    else { document.documentElement.classList.remove('dark'); }
    localStorage.setItem(LS_DARK,dark?'1':'0');
  },[dark]);

  useEffect(()=>{
    const offline=()=>setSyncStatus({state:'offline',message:'オフラインです。変更は端末に保存されています'});
    const online=()=>syncAll();
    window.addEventListener('offline',offline);window.addEventListener('online',online);
    return()=>{window.removeEventListener('offline',offline);window.removeEventListener('online',online);};
  });

  useEffect(()=>{
    if(!preferences.notifications||typeof Notification==='undefined'||Notification.permission!=='granted'||!txs.length)return;
    const stamp=`cf_notified_${todayStr()}`;
    if(localStorage.getItem(stamp)==='1')return;
    const start=todayD(),end=addDays(start,preferences.notifyDays||7),keys=new Set(skippedOccurrences);
    let largeCount=0,largeTotal=0;
    txs.filter(tx=>tx.type==='expense').forEach(tx=>{
      if(tx.recurring) expandRec(tx,start,end,keys).forEach(e=>{if(Math.abs(e.amt)>=(preferences.largePayment||100000)){largeCount++;largeTotal+=Math.abs(e.amt);}});
      else if(tx.startDate){const d=sod(parseISO(tx.startDate));if(!isBefore(d,start)&&!isAfter(d,end)&&tx.amount>=(preferences.largePayment||100000)){largeCount++;largeTotal+=tx.amount;}}
    });
    const notificationForecast=accounts.length?buildForecast(accounts,txs,end,keys):[];
    const risks=findShortfalls(accounts,notificationForecast);
    const lowLine=Number(preferences.lowBalance)||0;
    const lowAccounts=lowLine>0?accounts.filter(a=>notificationForecast.some(row=>Number(row[a.id])<lowLine)):[];
    const parts=[];
    if(risks.length)parts.push(`${risks.length}口座で残高不足の可能性`);
    else if(lowAccounts.length)parts.push(`${lowAccounts.length}口座が注意ラインを下回る見込み`);
    if(largeCount)parts.push(`大口支払い${largeCount}件・計¥${largeTotal.toLocaleString()}`);
    if(parts.length){new Notification('資金管理のお知らせ',{body:parts.join('／')});localStorage.setItem(stamp,'1');}
  },[accounts,txs,preferences,skippedOccurrences]);

  function persist(key,value){
    writeLocalCache(key,value);
    if(!navigator.onLine){setSyncStatus({state:'offline',message:'変更は端末に保存され、オンライン復帰時に同期されます'});retryRef.current=syncAll;return;}
    setSyncStatus({state:'saving',message:'クラウドへ保存しています'});
    const save=()=>_sbSet(key,value);
    const task=key==='transactions'?txSaveQueue.current.then(save):save();
    if(key==='transactions')txSaveQueue.current=task.catch(()=>{});
    retryRef.current=()=>persist(key,value);
    task.then(()=>setSyncStatus({state:'synced',message:`${new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})} に同期済み`}))
      .catch(e=>{setSyncStatus({state:'error',message:e.message});addToast('同期に失敗しました。端末には保存されています','error');});
  }
  async function syncAll(){
    if(!navigator.onLine){setSyncStatus({state:'offline',message:'オフラインです'});return;}
    setSyncStatus({state:'saving',message:'すべてのデータを同期しています'});
    try{
      await Promise.all([
        _sbSet('accounts',accounts),_sbSet('transactions',txs),_sbSet('budgets',budgets),_sbSet('skipped',skippedOccurrences),_sbSet('preferences',preferences)
      ]);
      setSyncStatus({state:'synced',message:'すべて同期済み'});addToast('クラウドと同期しました');
    }catch(e){setSyncStatus({state:'error',message:e.message});addToast('再同期に失敗しました','error');}
  }
  function updAcc(next){setAccounts(next);persist('accounts',next);}
  function updTxs(next){setTxs(next);persist('transactions',next);}
  function updBudgets(next){setBudgets(next);persist('budgets',next);addToast('予算を保存しました');}
  function updPreferences(next){setPreferences(next);persist('preferences',next);}
  function handleSkip(key){
    const next=skippedOccurrences.includes(key)?skippedOccurrences:[...skippedOccurrences,key];
    setSkippedOccurrences(next);
    localStorage.setItem(LS_SKIPPED,JSON.stringify(next));
    persist('skipped',next);
    addToast('支払済みとして予測から除外しました');
  }
  function handleRestore(key){
    const next=skippedOccurrences.filter(k=>k!==key);
    setSkippedOccurrences(next);
    localStorage.setItem(LS_SKIPPED,JSON.stringify(next));
    persist('skipped',next);
    addToast('予定を予測に戻しました');
  }
  function deleteTx(id){
    updTxs(txs.filter(t=>t.id!==id));
    const next=skippedOccurrences.filter(k=>!k.startsWith(id+'_'));
    setSkippedOccurrences(next);persist('skipped',next);
  }
  function restoreBackup(data){
    if(!data||!Array.isArray(data.accounts)||!Array.isArray(data.transactions)){addToast('対応していないバックアップ形式です','error');return;}
    if(!window.confirm(`口座${data.accounts.length}件・取引${data.transactions.length}件で現在のデータを置き換えますか？`))return;
    const nextBudgets=data.budgets||{},nextSkipped=data.skipped||[],nextPrefs={...DEFAULT_PREFS,...(data.preferences||{})};
    setAccounts(data.accounts);setTxs(data.transactions);setBudgets(nextBudgets);setSkippedOccurrences(nextSkipped);setPreferences(nextPrefs);
    persist('accounts',data.accounts);persist('transactions',data.transactions);persist('budgets',nextBudgets);persist('skipped',nextSkipped);persist('preferences',nextPrefs);
    addToast('バックアップを復元しました');setShowSettings(false);
  }
  function importCsv(text){
    const {items,skipped}=transactionsFromCsv(text,accounts);
    if(!items.length){addToast('追加できる取引がありませんでした','error');return;}
    updTxs([...txs,...items]);addToast(`${items.length}件を追加しました${skipped?`（${skipped}件スキップ）`:''}`);setShowSettings(false);setActiveView('transactions');
  }

  if(loading) return h('div',{className:'min-h-screen bg-[#f7f8fc] dark:bg-gray-950 flex items-center justify-center'},
    h('div',{className:'text-center'},h('div',{className:'w-10 h-10 rounded-full border-2 border-indigo-200 border-t-indigo-600 animate-spin mx-auto mb-3'}),h('p',{className:'text-gray-400 dark:text-gray-500 text-sm'},'読み込み中…'))
  );

  return h('div',{className:'min-h-screen bg-[#f4f6fb] dark:bg-gray-950'},
    h('header',{className:'bg-white/90 dark:bg-gray-900/90 backdrop-blur-xl border-b border-gray-200/60 dark:border-gray-800/60 sticky top-0 z-30'},
      h('div',{className:'max-w-6xl mx-auto px-3 sm:px-6 py-3 flex items-center justify-between gap-3'},
        h('button',{onClick:()=>setActiveView('home'),className:'flex items-center gap-2.5 flex-shrink-0','aria-label':'ホームへ'},
          h('div',{className:'w-9 h-9 bg-gradient-to-br from-indigo-500 to-violet-600 rounded-xl flex items-center justify-center shadow-[0_6px_16px_rgba(79,70,229,0.25)]'},
            h('span',{className:'text-base leading-none font-bold text-white'},'¥')
          ),
          h('h1',{className:'text-base sm:text-lg font-bold text-gray-900 dark:text-gray-100 tracking-tight'},'資金管理')
        ),
        h(AppNavigation,{active:activeView,onChange:setActiveView}),
        h('div',{className:'flex items-center gap-1.5'},
          h(SyncStatus,{status:syncStatus,onRetry:()=>retryRef.current?retryRef.current():syncAll()}),
          h('button',{
            onClick:()=>setDark(v=>!v),
            className:'w-8 h-8 flex items-center justify-center rounded-full text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors',
            title:dark?'ライトモードに切替':'ダークモードに切替','aria-label':dark?'ライトモードに切替':'ダークモードに切替'
          },
            dark
              ? h('svg',{className:'w-4 h-4',viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:'2'},
                  h('circle',{cx:'12',cy:'12',r:'5'}),
                  h('path',{d:'M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42'})
                )
              : h('svg',{className:'w-4 h-4',viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:'2'},
                  h('path',{d:'M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z'})
                )
          ),
          h('div',{className:'w-px h-5 bg-gray-200 dark:bg-gray-700 mx-1'}),
          h('button',{
            onClick:()=>setShowSettings(true),
            className:'flex items-center gap-1.5 px-2 sm:px-3 py-1.5 rounded-full text-sm font-medium text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors','aria-label':'設定を開く'
          },
            h('svg',{className:'w-4 h-4',viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:'2'},
              h('circle',{cx:'12',cy:'12',r:'3'}),
              h('path',{d:'M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z'})
            ),
            h('span',{className:'hidden sm:inline'},'設定')
          )
        )
      )
    ),
    h('main',{className:'max-w-6xl mx-auto px-3 sm:px-6 py-5 sm:py-7 pb-28'},
      activeView==='home'&&h(Dashboard,{accounts,txs,dark,
        onAddTx:tx=>updTxs([...txs,tx]),
        onUpdTx:updated=>{updTxs(txs.map(t=>t.id===updated.id?updated:t));addToast('取引を更新しました');},
        onUpdAcc:updated=>updAcc(accounts.map(a=>a.id===updated.id?updated:a)),
        onNavigate:setActiveView,
        skippedOccurrences,
        onSkip:handleSkip,
        onRestore:handleRestore,
        onDeleteTx:deleteTx
      }),
      activeView==='transactions'&&h('div',{className:'space-y-4'},h('div',null,h('h2',{className:'text-xl font-bold text-gray-900 dark:text-gray-100'},'取引'),h('p',{className:'text-sm text-gray-400 mt-1'},'予定・実績・定期取引を管理')),h(TxManager,{accounts,txs,onChange:updTxs,addToast})),
      activeView==='accounts'&&h('div',{className:'space-y-4'},h('div',null,h('h2',{className:'text-xl font-bold text-gray-900 dark:text-gray-100'},'口座'),h('p',{className:'text-sm text-gray-400 mt-1'},'残高と表示色を管理')),h(AccountManager,{accounts,onChange:updAcc,addToast})),
      activeView==='analysis'&&h(AnalysisView,{txs,budgets,onBudgetChange:updBudgets,skippedOccurrences})
    ),
    showSettings&&h(PreferencesModal,{onClose:()=>setShowSettings(false),dark,setDark,syncStatus,onRetry:syncAll,accounts,txs,budgets,skipped:skippedOccurrences,prefs:preferences,onPrefs:updPreferences,onRestore:restoreBackup,onCsvImport:importCsv}),
    h(Toast,{toasts})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(React.StrictMode,null,h(App)));
</script>
