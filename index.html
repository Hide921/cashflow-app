  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script>
const { useState, useEffect, useMemo, useRef, createElement: h } = React;

// ─── Date helpers ─────────────────────────────────────
function sod(d){ const x=new Date(d); x.setHours(0,0,0,0); return x; }
function parseISO(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function fmt(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
const DOW=['日','月','火','水','木','金','土'];
function fmtDisp(s){ const [y,m,d]=s.split('-'); const dt=new Date(Number(y),Number(m)-1,Number(d)); return `${y}/${m}/${d}(${DOW[dt.getDay()]})`; }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function addMonths(d,n){
  // 基準日の「日」を保持しつつ月を加算（月末オーバーフロー対策）
  const day=d.getDate();
  const x=new Date(d); x.setDate(1); x.setMonth(x.getMonth()+n);
  const last=new Date(x.getFullYear(),x.getMonth()+1,0).getDate();
  x.setDate(Math.min(day,last)); return x;
}
function isAfter(a,b){ return a.getTime()>b.getTime(); }
function isBefore(a,b){ return a.getTime()<b.getTime(); }
// 日本の祝日リスト（2025〜2027年）
const JP_HOLIDAYS=new Set([
  // 2025
  '2025-01-01','2025-01-13','2025-02-11','2025-02-23','2025-02-24',
  '2025-03-20','2025-04-29','2025-05-03','2025-05-04','2025-05-05',
  '2025-07-21','2025-08-11','2025-09-15','2025-09-23','2025-10-13',
  '2025-11-03','2025-11-23','2025-11-24',
  // 2026
  '2026-01-01','2026-01-12','2026-02-11','2026-02-23',
  '2026-03-20','2026-04-29','2026-05-03','2026-05-04','2026-05-05','2026-05-06',
  '2026-07-20','2026-08-11','2026-09-21','2026-09-23','2026-10-12',
  '2026-11-03','2026-11-23',
  // 2027
  '2027-01-01','2027-01-11','2027-02-11','2027-02-23',
  '2027-03-21','2027-04-29','2027-05-03','2027-05-04','2027-05-05',
  '2027-07-19','2027-08-11','2027-09-20','2027-09-23','2027-10-11',
  '2027-11-03','2027-11-23'
]);
// 土日・祝日なら直前の営業日に戻す
function prevBizDay(d){
  let x=new Date(d);
  while(true){
    const dow=x.getDay(), ds=fmt(x);
    if(dow!==0 && dow!==6 && !JP_HOLIDAYS.has(ds)) break;
    x.setDate(x.getDate()-1);
  }
  return x;
}
// 土日・祝日なら翌営業日に進める
function nextBizDay(d){
  let x=new Date(d);
  while(true){
    const dow=x.getDay(), ds=fmt(x);
    if(dow!==0 && dow!==6 && !JP_HOLIDAYS.has(ds)) break;
    x.setDate(x.getDate()+1);
  }
  return x;
}
function todayStr(){ return fmt(sod(new Date())); }
function todayD(){ return sod(new Date()); }

// ─── Storage ──────────────────────────────────────────
function getAccounts(){ try{ return JSON.parse(localStorage.getItem('cf_acc')||'[]'); }catch{ return []; } }
function saveAccounts(v){ localStorage.setItem('cf_acc',JSON.stringify(v)); }
function getTxs(){ try{ return JSON.parse(localStorage.getItem('cf_txs')||'[]'); }catch{ return []; } }
function saveTxs(v){ localStorage.setItem('cf_txs',JSON.stringify(v)); }
function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }

// ─── Forecast ─────────────────────────────────────────
function expandRec(tx, startD, endD){
  const evts=[];
  const base=sod(parseISO(tx.startDate));
  const lim=tx.endDate ? new Date(Math.min(sod(parseISO(tx.endDate)),endD)) : endD;
  const overrides=tx.overrides||{};
  // 前の日付からチェーンせず、常に base から n 番目を計算（月末ズレ防止）
  for(let n=0;n<1500;n++){
    let cur;
    if(tx.frequency==='daily') cur=addDays(base,n);
    else if(tx.frequency==='weekly') cur=addDays(base,n*7);
    else if(tx.frequency==='monthly') cur=addMonths(base,n);
    else if(tx.frequency==='yearly') cur=addMonths(base,n*12);
    else break;
    cur=sod(cur);
    if(isAfter(cur,lim)) break;
    const biz=tx.adjustBizDay;
    const adj=biz==='prev'||biz===true ? sod(prevBizDay(cur)) : biz==='next' ? sod(nextBizDay(cur)) : cur;
    if(!isBefore(adj,startD)){
      const raw=overrides[fmt(adj)]!==undefined ? overrides[fmt(adj)] : tx.amount;
      const amt=tx.type==='income'?raw:tx.type==='transfer'?raw:-raw;
      evts.push({date:adj,amt});
    }
  }
  return evts;
}

function buildForecast(accounts, txs, endD){
  const today=todayD();
  const bal={};
  accounts.forEach(a=>{ bal[a.id]=a.balance; });
  const evts=[];
  txs.forEach(tx=>{
    if(tx.recurring){
      if(tx.type==='transfer'){
        expandRec(tx,today,endD).forEach(e=>{
          evts.push({date:e.date,amt:-e.amt,aid:tx.fromAccountId});
          evts.push({date:e.date,amt:e.amt,aid:tx.toAccountId});
        });
      } else {
        expandRec(tx,today,endD).forEach(e=>evts.push({date:e.date,amt:e.amt,aid:tx.accountId}));
      }
    } else {
      const d=sod(parseISO(tx.startDate));
      if(!isBefore(d,today)&&!isAfter(d,endD)){
        if(tx.type==='transfer'){
          evts.push({date:d,amt:-tx.amount,aid:tx.fromAccountId});
          evts.push({date:d,amt:tx.amount,aid:tx.toAccountId});
        } else {
          evts.push({date:d,amt:tx.type==='income'?tx.amount:-tx.amount,aid:tx.accountId});
        }
      }
    }
  });
  evts.sort((a,b)=>a.date-b.date);
  const res=[];
  const cur={...bal};
  let ei=0;
  let cursor=new Date(today);
  while(!isAfter(cursor,endD)){
    const ds=fmt(cursor);
    while(ei<evts.length&&!isAfter(evts[ei].date,cursor)){
      const ev=evts[ei]; if(cur[ev.aid]!==undefined) cur[ev.aid]+=ev.amt; ei++;
    }
    const row={date:ds};
    let tot=0;
    accounts.forEach(a=>{ row[a.id]=Math.round(cur[a.id]); tot+=cur[a.id]; });
    row.total=Math.round(tot);
    res.push(row);
    cursor=addDays(cursor,1);
  }
  return res;
}

// ─── Transaction List for Details ─────────────────────
function buildTxList(txs, endD) {
  const today=todayD();
  const evts=[];
  txs.forEach(tx=>{
    if(tx.recurring){
      if(tx.type==='transfer'){
        expandRec(tx,today,endD).forEach(e=>{
          evts.push({date:fmt(e.date),label:tx.label,category:tx.category||'',type:'transfer',amount:tx.amount,fromAccountId:tx.fromAccountId,toAccountId:tx.toAccountId});
        });
      } else {
        expandRec(tx,today,endD).forEach(e=>{
          evts.push({date:fmt(e.date),label:tx.label,category:tx.category||'',type:tx.type,amount:tx.amount,accountId:tx.accountId});
        });
      }
    } else {
      const d=sod(parseISO(tx.startDate));
      if(!isBefore(d,today)&&!isAfter(d,endD)){
        if(tx.type==='transfer'){
          evts.push({date:fmt(d),label:tx.label,category:tx.category||'',type:'transfer',amount:tx.amount,fromAccountId:tx.fromAccountId,toAccountId:tx.toAccountId});
        } else {
          evts.push({date:fmt(d),label:tx.label,category:tx.category||'',type:tx.type,amount:tx.amount,accountId:tx.accountId});
        }
      }
    }
  });
  evts.sort((a,b)=>a.date.localeCompare(b.date));
  return evts;
}

// ─── Constants ────────────────────────────────────────
const COLORS=['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16'];
const CATS=['給与','家賃','食費','交通費','光熱費','保険','娯楽','その他'];
const FREQS={daily:'毎日',weekly:'毎週',monthly:'毎月',yearly:'毎年'};
const PERIODS=[{label:'1ヶ月',months:1},{label:'3ヶ月',months:3},{label:'6ヶ月',months:6},{label:'1年',months:12}];

// ─── SVG Line Chart ───────────────────────────────────
function SvgChart({ data, accounts }){
  const W=700, H=260, PL=72, PR=20, PT=16, PB=40;
  const iW=W-PL-PR, iH=H-PT-PB;

  if(!data.length) return h('div',{className:'flex items-center justify-center h-48 text-gray-400 text-sm'},'口座を追加するとグラフが表示されます');

  // collect all series keys
  const keys=['total',...accounts.map(a=>a.id)];
  const colorMap={total:'#1e40af'};
  accounts.forEach(a=>{ colorMap[a.id]=a.color; });
  const nameMap={total:'合計'};
  accounts.forEach(a=>{ nameMap[a.id]=a.name; });

  const allVals=data.flatMap(d=>keys.map(k=>d[k]??0));
  let minV=Math.min(...allVals), maxV=Math.max(...allVals);
  if(minV===maxV){ minV-=10000; maxV+=10000; }
  const pad=(maxV-minV)*0.08;
  const yMin=minV-pad, yMax=maxV+pad;

  function xp(i){ return PL+i/(data.length-1||1)*iW; }
  function yp(v){ return PT+iH-(v-yMin)/(yMax-yMin)*iH; }
  function fmtY(v){ if(Math.abs(v)>=10000000) return (v/10000000).toFixed(1)+'千万'; if(Math.abs(v)>=10000) return Math.round(v/10000)+'万'; return Math.round(v/1000)+'k'; }

  // Y grid / ticks
  const ticks=[];
  const step=Math.pow(10,Math.floor(Math.log10(Math.max(1,yMax-yMin)/5)));
  const tickStep=Math.ceil((yMax-yMin)/5/step)*step;
  let tv=Math.ceil(yMin/tickStep)*tickStep;
  while(tv<=yMax){ ticks.push(tv); tv+=tickStep; }

  // X ticks: ~6 labels
  const xTicks=[];
  const xi=Math.max(1,Math.floor(data.length/6));
  data.forEach((d,i)=>{ if(i%xi===0||i===data.length-1) xTicks.push({i,label:d.date.slice(5)}); });

  // Tooltip state
  const [tip,setTip]=useState(null);

  function onMouseMove(e){
    const rect=e.currentTarget.getBoundingClientRect();
    const mx=e.clientX-rect.left;
    const ix=Math.round((mx-PL)/iW*(data.length-1));
    if(ix>=0&&ix<data.length) setTip({i:ix,x:xp(ix),d:data[ix]});
  }

  return h('div',{className:'relative'},
    h('svg',{width:'100%',viewBox:`0 0 ${W} ${H}`,style:{fontFamily:'inherit'},onMouseMove,onMouseLeave:()=>setTip(null)},
      // grid lines
      ticks.map(v=>h('line',{key:v,x1:PL,y1:yp(v),x2:W-PR,y2:yp(v),stroke:'#f0f0f0',strokeWidth:1})),
      // Y axis ticks
      ticks.map(v=>h('g',{key:'yt'+v},
        h('line',{x1:PL-4,y1:yp(v),x2:PL,y2:yp(v),stroke:'#d1d5db',strokeWidth:1}),
        h('text',{x:PL-6,y:yp(v)+4,textAnchor:'end',fontSize:10,fill:'#6b7280'},fmtY(v))
      )),
      // X axis ticks
      xTicks.map(({i,label})=>h('g',{key:'xt'+i},
        h('line',{x1:xp(i),y1:PT+iH,x2:xp(i),y2:PT+iH+4,stroke:'#d1d5db',strokeWidth:1}),
        h('text',{x:xp(i),y:PT+iH+16,textAnchor:'middle',fontSize:10,fill:'#6b7280'},label)
      )),
      // axes
      h('line',{x1:PL,y1:PT,x2:PL,y2:PT+iH,stroke:'#d1d5db',strokeWidth:1}),
      h('line',{x1:PL,y1:PT+iH,x2:W-PR,y2:PT+iH,stroke:'#d1d5db',strokeWidth:1}),
      // lines (accounts first, total on top)
      [...accounts.map(a=>a.id),'total'].map((k,ki)=>{
        const pts=data.map((d,i)=>`${xp(i)},${yp(d[k]??0)}`).join(' ');
        return h('polyline',{key:k,points:pts,fill:'none',stroke:colorMap[k],strokeWidth:k==='total'?2.5:1.5,strokeDasharray:k==='total'?undefined:'5,3',opacity:0.9});
      }),
      // tooltip crosshair
      tip && h('line',{x1:tip.x,y1:PT,x2:tip.x,y2:PT+iH,stroke:'#94a3b8',strokeWidth:1,strokeDasharray:'3,2'}),
      // dots at tooltip position
      tip && keys.map(k=>h('circle',{key:k,cx:tip.x,cy:yp(tip.d[k]??0),r:4,fill:colorMap[k],stroke:'#fff',strokeWidth:1.5}))
    ),
    // Tooltip box
    tip && h('div',{
      className:'absolute bg-white border rounded-lg shadow-lg p-2 text-xs pointer-events-none z-10',
      style:{top:'4px',left:Math.min(tip.x/W*100,65)+'%'}
    },
      h('p',{className:'font-semibold text-gray-700 mb-1'},(()=>{const [y,m,d]=tip.d.date.split('-');const dt=new Date(Number(y),Number(m)-1,Number(d));return `${y}/${m}/${d}(${DOW[dt.getDay()]})`;})()),
      keys.map(k=>h('p',{key:k,style:{color:colorMap[k]}},`${nameMap[k]}: ¥${(tip.d[k]??0).toLocaleString()}`))
    ),
    // Legend
    h('div',{className:'flex flex-wrap gap-3 mt-2 pl-16'},
      keys.map(k=>h('span',{key:k,className:'flex items-center gap-1 text-xs text-gray-600'},
        h('span',{className:'inline-block w-6',style:{height:'2px',backgroundColor:colorMap[k],borderRadius:'1px'}}),
        nameMap[k]
      ))
    )
  );
}

// ─── Account Manager ─────────────────────────────────
function AccountManager({ accounts, onChange }){
  const DEF={name:'',bankName:'',balance:'',color:COLORS[0]};
  const [form,setForm]=useState(DEF);
  const [editId,setEditId]=useState(null);
  const [err,setErr]=useState('');
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));

  function submit(e){
    e.preventDefault();
    if(!form.name.trim()){setErr('口座名を入力してください');return;}
    if(form.balance===''){setErr('残高を入力してください');return;}
    setErr('');
    const item={...form,balance:Number(form.balance)};
    if(editId){ onChange(accounts.map(a=>a.id===editId?{...a,...item}:a)); setEditId(null); }
    else onChange([...accounts,{...item,id:genId()}]);
    setForm(DEF);
  }

  function startEdit(a){ setEditId(a.id); setForm({name:a.name,bankName:a.bankName,balance:String(a.balance),color:a.color}); }
  function cancel(){ setEditId(null); setForm(DEF); setErr(''); }

  return h('div',{className:'space-y-6'},
    h('div',{className:'bg-white rounded-xl shadow-sm border p-5'},
      h('h2',{className:'text-lg font-semibold text-gray-700 mb-4'},editId?'口座を編集':'口座を追加'),
      h('form',{onSubmit:submit,className:'grid grid-cols-2 gap-3'},
        h('div',null,
          h('label',{className:'block text-sm text-gray-600 mb-1'},'口座名 *'),
          h('input',{className:'w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400',placeholder:'例: 普通預金',value:form.name,onChange:e=>sf('name',e.target.value)})
        ),
        h('div',null,
          h('label',{className:'block text-sm text-gray-600 mb-1'},'銀行名'),
          h('input',{className:'w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400',placeholder:'例: 三菱UFJ銀行',value:form.bankName,onChange:e=>sf('bankName',e.target.value)})
        ),
        h('div',null,
          h('label',{className:'block text-sm text-gray-600 mb-1'},'現在残高 (円) *'),
          h('input',{type:'number',className:'w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400',placeholder:'0',value:form.balance,onChange:e=>sf('balance',e.target.value)})
        ),
        h('div',null,
          h('label',{className:'block text-sm text-gray-600 mb-1'},'カラー'),
          h('div',{className:'flex gap-2 flex-wrap'},
            COLORS.map(c=>h('button',{key:c,type:'button',onClick:()=>sf('color',c),
              className:`w-7 h-7 rounded-full border-2 transition-all ${form.color===c?'border-gray-800 scale-110':'border-transparent'}`,
              style:{backgroundColor:c}}))
          )
        ),
        err&&h('p',{className:'col-span-2 text-red-500 text-sm'},err),
        h('div',{className:'col-span-2 flex gap-2'},
          h('button',{type:'submit',className:'bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-blue-700'},editId?'更新':'追加'),
          editId&&h('button',{type:'button',onClick:cancel,className:'border px-5 py-2 rounded-lg text-sm text-gray-600 hover:bg-gray-100'},'キャンセル')
        )
      )
    ),
    h('div',{className:'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4'},
      accounts.length===0&&h('p',{className:'text-gray-400 text-sm col-span-full'},'口座がまだ登録されていません'),
      accounts.map(a=>h('div',{key:a.id,className:'bg-white rounded-xl shadow-sm border p-4 flex flex-col gap-2'},
        h('div',{className:'flex items-center gap-2'},
          h('span',{className:'w-3 h-3 rounded-full',style:{backgroundColor:a.color}}),
          h('span',{className:'font-semibold text-gray-800'},a.name)
        ),
        a.bankName&&h('p',{className:'text-xs text-gray-400'},a.bankName),
        h('p',{className:'text-2xl font-bold text-gray-900'},`¥${a.balance.toLocaleString()}`),
        h('div',{className:'flex gap-2 mt-1'},
          h('button',{onClick:()=>startEdit(a),className:'text-xs text-blue-600 hover:underline'},'編集'),
          h('button',{onClick:()=>onChange(accounts.filter(x=>x.id!==a.id)),className:'text-xs text-red-500 hover:underline'},'削除')
        )
      ))
    )
  );
}

// ─── Transaction Manager ──────────────────────────────
function TxManager({ accounts, txs, onChange }){
  const DEF={label:'',type:'expense',amount:'',category:'その他',accountId:'',fromAccountId:'',toAccountId:'',overrides:{},recurring:false,frequency:'monthly',startDate:todayStr(),endDate:'',adjustBizDay:''};
  const [form,setForm]=useState(DEF);
  const [editId,setEditId]=useState(null);
  const [err,setErr]=useState('');
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));
  const [ovDate,setOvDate]=useState('');
  const [ovAmt,setOvAmt]=useState('');
  function addOverride(){ if(!ovDate||!ovAmt||Number(ovAmt)<=0) return; sf('overrides',{...(form.overrides||{}),[ovDate]:Number(ovAmt)}); setOvDate(''); setOvAmt(''); }
  function removeOverride(ds){ const n={...(form.overrides||{})}; delete n[ds]; sf('overrides',n); }

  function submit(e){
    e.preventDefault();
    if(!form.label.trim()){setErr('名前を入力してください');return;}
    if(!form.amount||Number(form.amount)<=0){setErr('金額を入力してください');return;}
    if(form.type==='transfer'){
      if(!form.fromAccountId||!form.toAccountId){setErr('振替元・振替先の口座を選択してください');return;}
      if(form.fromAccountId===form.toAccountId){setErr('振替元と振替先は別の口座を選択してください');return;}
    } else {
      if(!form.accountId){setErr('口座を選択してください');return;}
    }
    setErr('');
    const tx={...form,amount:Number(form.amount),endDate:form.endDate||null};
    if(editId){ onChange(txs.map(t=>t.id===editId?{...tx,id:editId}:t)); setEditId(null); }
    else onChange([...txs,{...tx,id:genId()}]);
    setForm({...DEF,accountId:form.accountId});
  }

  function startEdit(tx){ setEditId(tx.id); setForm({label:tx.label,type:tx.type,amount:String(tx.amount),category:tx.category||'その他',accountId:tx.accountId||'',fromAccountId:tx.fromAccountId||'',toAccountId:tx.toAccountId||'',overrides:tx.overrides||{},recurring:tx.recurring,frequency:tx.frequency||'monthly',startDate:tx.startDate,endDate:tx.endDate||'',adjustBizDay:tx.adjustBizDay===true?'prev':(tx.adjustBizDay||'')}); }
  function cancel(){ setEditId(null); setForm(DEF); setErr(''); }

  const accMap=Object.fromEntries(accounts.map(a=>[a.id,a]));

  return h('div',{className:'space-y-6'},
    h('div',{className:'bg-white rounded-xl shadow-sm border p-5'},
      h('h2',{className:'text-lg font-semibold text-gray-700 mb-4'},editId?'取引を編集':'取引を追加'),
      accounts.length===0&&h('p',{className:'text-amber-600 text-sm mb-3'},'先に「口座管理」タブで口座を追加してください'),
      h('form',{onSubmit:submit,className:'grid grid-cols-2 gap-3'},
        h('div',{className:'col-span-2'},
          h('label',{className:'block text-sm text-gray-600 mb-1'},'名前 *'),
          h('input',{className:'w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400',placeholder:'例: 月給、家賃',value:form.label,onChange:e=>sf('label',e.target.value)})
        ),
        h('div',null,
          h('label',{className:'block text-sm text-gray-600 mb-1'},'種別'),

// ─── Balance Table ────────────────────────────────────
function BalanceTable({ accounts, fData }){
  if(!accounts.length) return null;

  const cols=fData;

  const fmtCol=s=>{
    const [y,mo,d]=s.split('-');
    const dt=new Date(Number(y),Number(mo)-1,Number(d));
    const m=mo.startsWith('0')?mo.slice(1):mo;
    return `${m}/${d}(${DOW[dt.getDay()]})`;
  };
  const fmtYen=v=>v.toLocaleString();

  return h('div',{className:'bg-white rounded-xl border shadow-sm overflow-hidden'},
    h('div',{className:'px-5 py-3 border-b'},
      h('h2',{className:'text-lg font-semibold text-gray-700'},'口座別 残高推移')
    ),
    h('div',{className:'overflow-x-auto'},
      h('table',{className:'text-sm border-collapse w-full'},
        h('thead',null,
          h('tr',{className:'bg-gray-50'},
            h('th',{className:'text-left px-4 py-2.5 font-medium text-gray-500 whitespace-nowrap border-b border-r sticky left-0 bg-gray-50 z-10'},'口座'),
            cols.map(col=>
              h('th',{key:col.date,className:'px-3 py-2.5 font-medium text-gray-500 whitespace-nowrap border-b text-right min-w-[80px]'},
                fmtCol(col.date))
            )
          )
        ),
        h('tbody',null,
          accounts.map((a,ai)=>{
            const prev=cols.map(col=>col[a.id]??0);
            const hasNeg=cols.some(col=>(col[a.id]??0)<0);
            return h('tr',{key:a.id,className:`${ai%2===0?'bg-white':'bg-gray-50'} hover:bg-blue-50 transition-colors`},
              h('td',{className:`px-4 py-2.5 whitespace-nowrap border-r sticky left-0 z-10 ${ai%2===0?'bg-white':'bg-gray-50'}`},
                h('span',{className:'flex items-center gap-2'},
                  h('span',{className:'w-2.5 h-2.5 rounded-full flex-shrink-0',style:{backgroundColor:a.color}}),
                  h('span',{className:'font-medium text-gray-800'},a.name),
                  a.bankName&&h('span',{className:'text-xs text-gray-400 ml-1'},a.bankName),
                  hasNeg&&h('span',{className:'text-xs text-red-500 ml-1',title:'マイナス残高あり'},'⚠️')
                )
              ),
              cols.map((col,ci)=>{
                const val=col[a.id]??0;
                const diff=ci>0?(val-(prev[ci-1]??val)):0;
                const neg=val<0;
                return h('td',{key:col.date,className:`px-3 py-2.5 text-right whitespace-nowrap${neg?' bg-red-50':''}`},
                  h('span',{className:`font-semibold ${neg?'text-red-600':'text-gray-800'}`},`¥${fmtYen(val)}`),
                  ci>0&&diff!==0&&h('span',{className:`block text-xs ${diff>=0?'text-emerald-500':'text-red-400'}`},
                    `${diff>=0?'+':''}${fmtYen(diff)}`)
                );
              })
            );
          }),
          // 合計行
          h('tr',{className:'font-bold border-t-2 border-blue-200'},
            h('td',{className:'px-4 py-2.5 whitespace-nowrap border-r sticky left-0 z-10 text-blue-800 bg-blue-50'},'合計'),
            cols.map((col,ci)=>{
              const val=col.total??0;
              const prevVal=ci>0?(cols[ci-1].total??val):val;
              const diff=ci>0?(val-prevVal):0;
              const neg=val<0;
              return h('td',{key:col.date,className:`px-3 py-2.5 text-right whitespace-nowrap ${neg?'bg-red-100':'bg-blue-50'}`},
                h('span',{className:`${neg?'text-red-700':'text-blue-800'}`},`¥${fmtYen(val)}`),
                ci>0&&diff!==0&&h('span',{className:`block text-xs ${diff>=0?'text-emerald-600':'text-red-500'}`},
                  `${diff>=0?'+':''}${fmtYen(diff)}`)
              );
            })
          )
        )
      )
    )
  );
}

// ─── Transaction Details ──────────────────────────────
const TX_PAGE=20;
function TxDetails({ txs, endD, accounts }){
  const [show,setShow]=useState(false);
  const [page,setPage]=useState(0);
  const accMap=useMemo(()=>Object.fromEntries(accounts.map(a=>[a.id,a])),[accounts]);
  const list=useMemo(()=>{
    if(!txs.length||!accounts.length) return [];
    return buildTxList(txs,endD);
  },[txs,endD,accounts]);

  if(!accounts.length) return null;
  const shown=(page+1)*TX_PAGE;

  return h('div',{className:'bg-white rounded-xl border shadow-sm'},
    h('button',{
      onClick:()=>{setShow(v=>!v);setPage(0);},
      className:'w-full flex items-center justify-between px-5 py-4 text-left hover:bg-gray-50 transition-colors rounded-xl'
    },
      h('span',{className:'text-lg font-semibold text-gray-700 flex items-center gap-2'},
        '予定明細',
        list.length>0&&h('span',{className:'text-xs font-normal text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full'},`${list.length}件`)
      ),
      h('span',{className:'text-gray-400 text-sm select-none'},show?'▲':'▼')
    ),
    show&&h('div',null,
      list.length===0
        ?h('div',{className:'text-center py-8 text-gray-400 text-sm border-t'},'この期間に予定された取引はありません')
        :h('div',null,
            h('div',{className:'overflow-x-auto border-t'},
              h('table',{className:'w-full text-sm'},
                h('thead',{className:'bg-gray-50 text-gray-500 text-xs uppercase tracking-wider'},
                  h('tr',null,
                    ['日付','名前','カテゴリ','口座','金額'].map((col,i)=>
                      h('th',{key:i,className:`px-4 py-3 font-medium ${i===4?'text-right':'text-left'}`},col))
                  )
                ),
                h('tbody',{className:'divide-y'},
                  list.slice(0,shown).map((ev,i)=>{
                    const acc=accMap[ev.accountId];
                    const fromAcc=accMap[ev.fromAccountId];
                    const toAcc=accMap[ev.toAccountId];
                    const isIncome=ev.type==='income';
                    const isTransfer=ev.type==='transfer';
                    return h('tr',{key:i,className:'hover:bg-gray-50'},
                      h('td',{className:'px-4 py-2.5 text-gray-500 whitespace-nowrap text-xs'},fmtDisp(ev.date)),
                      h('td',{className:'px-4 py-2.5 font-medium text-gray-800'},ev.label),
                      h('td',{className:'px-4 py-2.5 text-gray-500 text-xs'},ev.category||'—'),
                      h('td',{className:'px-4 py-2.5'},
                        isTransfer
                          ?h('span',{className:'flex items-center gap-1 flex-wrap text-xs'},
                              fromAcc&&h('span',{className:'flex items-center gap-1'},
                                h('span',{className:'w-2 h-2 rounded-full flex-shrink-0',style:{backgroundColor:fromAcc.color}}),
                                h('span',null,fromAcc.name)),
                              h('span',{className:'text-gray-400 mx-0.5'},'→'),
                              toAcc&&h('span',{className:'flex items-center gap-1'},
                                h('span',{className:'w-2 h-2 rounded-full flex-shrink-0',style:{backgroundColor:toAcc.color}}),
                                h('span',null,toAcc.name)))
                          :acc
                            ?h('span',{className:'flex items-center gap-1 text-xs text-gray-600'},
                                h('span',{className:'w-2 h-2 rounded-full flex-shrink-0',style:{backgroundColor:acc.color}}),
                                acc.name)
                            :h('span',{className:'text-gray-400'},'—')
                      ),
                      h('td',{className:`px-4 py-2.5 text-right font-semibold whitespace-nowrap ${isIncome?'text-emerald-600':isTransfer?'text-purple-600':'text-red-600'}`},
                        `${isIncome?'+':isTransfer?'':'-'}¥${ev.amount.toLocaleString()}`)
                    );
                  })
                )
              )
            ),
            list.length>shown&&h('div',{className:'px-5 py-3 border-t text-center'},
              h('button',{onClick:()=>setPage(p=>p+1),className:'text-sm text-blue-600 hover:underline'},

            )
          )
    )
  );
}

// ─── Dashboard ───────────────────────────────────────
function Dashboard({ accounts, txs }){
  const [pIdx,setPIdx]=useState(1);
  const endD=useMemo(()=>addMonths(todayD(),PERIODS[pIdx].months),[pIdx]);
  const fullData=useMemo(()=>{
    if(!accounts.length) return [];
    return buildForecast(accounts,txs,endD);
  },[accounts,txs,endD,pIdx]);
  const fData=useMemo(()=>{
    const step=PERIODS[pIdx].months<=1?1:7;
    return fullData.filter((_,i)=>i%step===0);
  },[fullData,pIdx]);

  const totalBal=accounts.reduce((s,a)=>s+a.balance,0);
  const monthly=useMemo(()=>{
    let inc=0,exp=0;
    txs.filter(tx=>tx.recurring&&tx.type!=='transfer').forEach(tx=>{
      const m=tx.frequency==='monthly'?1:tx.frequency==='yearly'?1/12:tx.frequency==='weekly'?4:30;
      if(tx.type==='income') inc+=Math.round(tx.amount*m);
      else exp+=Math.round(tx.amount*m);
    });
    return {inc,exp};
  },[txs]);

  return h('div',{className:'space-y-6'},
    h('div',{className:'grid grid-cols-1 sm:grid-cols-3 gap-4'},
      h('div',{className:'bg-white rounded-xl border shadow-sm p-5'},
        h('p',{className:'text-sm text-gray-500 mb-1'},'総資産'),
        h('p',{className:'text-3xl font-bold text-gray-900'},`¥${totalBal.toLocaleString()}`),
        h('p',{className:'text-xs text-gray-400 mt-1'},`${accounts.length}口座`)
      ),
      h('div',{className:'bg-white rounded-xl border shadow-sm p-5'},
        h('p',{className:'text-sm text-gray-500 mb-1'},'月間収入（定期）'),
        h('p',{className:'text-2xl font-bold text-emerald-600'},`+¥${monthly.inc.toLocaleString()}`)
      ),
      h('div',{className:'bg-white rounded-xl border shadow-sm p-5'},
        h('p',{className:'text-sm text-gray-500 mb-1'},'月間支出（定期）'),
        h('p',{className:'text-2xl font-bold text-red-500'},`-¥${monthly.exp.toLocaleString()}`),
        h('p',{className:`text-xs mt-1 ${monthly.inc-monthly.exp>=0?'text-emerald-600':'text-red-500'}`},
          `月次収支: ${monthly.inc-monthly.exp>=0?'+':''}¥${(monthly.inc-monthly.exp).toLocaleString()}`)
      )
    ),
    accounts.length>0&&h('div',{className:'grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3'},
      accounts.map(a=>h('div',{key:a.id,className:'bg-white rounded-lg border shadow-sm p-3'},
        h('div',{className:'flex items-center gap-1.5 mb-1'},
          h('span',{className:'w-2.5 h-2.5 rounded-full',style:{backgroundColor:a.color}}),
          h('span',{className:'text-xs text-gray-500 truncate'},a.name)
        ),
        h('p',{className:'font-bold text-gray-800'},`¥${a.balance.toLocaleString()}`)
      ))
    ),
    h('div',{className:'bg-white rounded-xl border shadow-sm p-5'},
      h('div',{className:'flex items-center justify-between mb-4'},
        h('h2',{className:'text-lg font-semibold text-gray-700'},'将来の残高予測'),
        h('div',{className:'flex gap-1'},
          PERIODS.map((p,i)=>h('button',{key:i,onClick:()=>setPIdx(i),
            className:`px-3 py-1 rounded-full text-xs font-medium transition-colors ${pIdx===i?'bg-blue-600 text-white':'text-gray-500 hover:bg-gray-100'}`},p.label))
        )
      ),
      h(SvgChart,{data:fData,accounts})
    ),
    h(BalanceTable,{accounts,fData:fullData}),
    h(TxDetails,{txs,endD:endD,accounts})
  );
}

// ─── Gist Sync ────────────────────────────────────────
const GIST_FILE='cashflow-data.json';
const LS_TOKEN='cf_gh_token';
const LS_GIST_ID='cf_gist_id';
const LS_LAST_SYNC='cf_last_sync';

async function gistSave(token,gistId,accounts,txs){
  const content=JSON.stringify({accounts,transactions:txs},null,2);
  const hdrs={'Authorization':`Bearer ${token}`,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'};
  if(gistId){
    const r=await fetch(`https://api.github.com/gists/${gistId}`,{method:'PATCH',headers:hdrs,body:JSON.stringify({files:{[GIST_FILE]:{content}}})});
    if(!r.ok) throw new Error(`更新失敗: ${r.status}`);
    return gistId;
  } else {
    const r=await fetch('https://api.github.com/gists',{method:'POST',headers:hdrs,body:JSON.stringify({description:'資金管理アプリ データ',public:false,files:{[GIST_FILE]:{content}}})});
    if(!r.ok) throw new Error(`作成失敗: ${r.status}`);
    const d=await r.json();
    return d.id;
  }
}

async function gistLoad(token,gistId){
  const hdrs={'Authorization':`Bearer ${token}`,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'};
  const r=await fetch(`https://api.github.com/gists/${gistId}`,{headers:hdrs});
  if(!r.ok) throw new Error(`読み込み失敗: ${r.status}`);
  const d=await r.json();
  const f=d.files[GIST_FILE];
  if(!f) throw new Error(`${GIST_FILE} が見つかりません`);
  return JSON.parse(f.content);
}

function GistSync({accounts,txs,onLoad}){
  const [open,setOpen]=useState(false);
  const [token,setToken]=useState(()=>localStorage.getItem(LS_TOKEN)||'');
  const [gistId,setGistId]=useState(()=>localStorage.getItem(LS_GIST_ID)||'');
  const [status,setStatus]=useState(null);
  const [busy,setBusy]=useState(false);
  const lastSync=localStorage.getItem(LS_LAST_SYNC);

  function save(){localStorage.setItem(LS_TOKEN,token);localStorage.setItem(LS_GIST_ID,gistId);}

  async function handleSave(){
    if(!token){setStatus({ok:false,msg:'トークンを入力してください'});return;}
    setBusy(true);setStatus(null);
    try{
      save();
      const id=await gistSave(token,gistId||null,accounts,txs);
      localStorage.setItem(LS_GIST_ID,id);
      localStorage.setItem(LS_LAST_SYNC,new Date().toLocaleString('ja-JP'));
      setGistId(id);
      setStatus({ok:true,msg:'クラウドに保存しました'});
    }catch(e){setStatus({ok:false,msg:e.message});}
    setBusy(false);
  }

  async function handleLoad(){
    if(!token){setStatus({ok:false,msg:'トークンを入力してください'});return;}
    if(!gistId){setStatus({ok:false,msg:'Gist ID を入力してください'});return;}
    setBusy(true);setStatus(null);
    try{
      save();
      const d=await gistLoad(token,gistId);
      localStorage.setItem(LS_LAST_SYNC,new Date().toLocaleString('ja-JP'));
      onLoad(d.accounts,d.transactions);
      setStatus({ok:true,msg:'クラウドから読み込みました'});
      setOpen(false);
    }catch(e){setStatus({ok:false,msg:e.message});}
    setBusy(false);
  }

  return h('div',{className:'relative'},
    h('button',{
      onClick:()=>setOpen(v=>!v),
      className:'flex items-center gap-1.5 px-3 py-1.5 rounded-full text-sm font-medium text-gray-600 hover:bg-gray-100 transition-colors',
      title:'GitHub Gist 同期'
    },
      h('svg',{className:'w-4 h-4',viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:'2'},
        h('path',{d:'M8 17l4 4 4-4M12 12v9'}),
        h('path',{d:'M20.88 18.09A5 5 0 0018 9h-1.26A8 8 0 103 16.29'})
      ),
      '同期',
      lastSync&&h('span',{className:'text-xs text-gray-400 hidden sm:inline'},lastSync)
    ),
    open&&h(React.Fragment,null,
      h('div',{className:'fixed inset-0 z-10',onClick:()=>setOpen(false)}),
      h('div',{className:'absolute right-0 top-10 z-20 w-80 bg-white border rounded-xl shadow-lg p-4 space-y-3'},
        h('h3',{className:'font-semibold text-gray-800 text-sm'},'GitHub Gist 同期'),
        h('div',null,
          h('label',{className:'text-xs text-gray-500 mb-1 block'},'Personal Access Token（gist スコープ必須）'),
          h('input',{type:'password',value:token,onChange:e=>setToken(e.target.value),placeholder:'ghp_xxxxxxxxxxxx',
            className:'w-full border rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400'})
        ),
        h('div',null,
          h('label',{className:'text-xs text-gray-500 mb-1 block'},'Gist ID（初回保存時に自動設定）'),
          h('input',{type:'text',value:gistId,onChange:e=>setGistId(e.target.value),placeholder:'（空欄で新規作成）',
            className:'w-full border rounded-lg px-3 py-1.5 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-400'})
        ),
        status&&h('p',{className:`text-xs px-3 py-2 rounded-lg ${status.ok?'bg-emerald-50 text-emerald-700':'bg-red-50 text-red-600'}`},status.msg),
        h('div',{className:'flex gap-2 pt-1'},
          h('button',{onClick:handleSave,disabled:busy,className:'flex-1 bg-blue-600 text-white text-sm font-medium rounded-lg py-1.5 hover:bg-blue-700 disabled:opacity-50 transition-colors'},busy?'処理中…':'クラウドに保存'),
          h('button',{onClick:handleLoad,disabled:busy,className:'flex-1 border text-sm font-medium rounded-lg py-1.5 text-gray-600 hover:bg-gray-50 disabled:opacity-50 transition-colors'},busy?'処理中…':'クラウドから読込')
        ),
        h('p',{className:'text-xs text-gray-400'},'トークンはブラウザのみに保存されます。')
      )
    )
  );
}

// ─── Auth ─────────────────────────────────────────────
const PW_HASH='3fe2da8dc9784ce81067508c60f7fd8e7ff4ac18cd7b1df2cf9ce21dd036a826';
const AUTH_KEY='cf_auth';

async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function LoginScreen({ onLogin }){
  const [pw,setPw]=useState('');
  const [err,setErr]=useState(false);
  const [loading,setLoading]=useState(false);

  async function submit(e){
    e.preventDefault();
    setLoading(true);
    const hash=await sha256(pw);
    if(hash===PW_HASH){
      sessionStorage.setItem(AUTH_KEY,'1');
      onLogin();
    } else {
      setErr(true);
      setPw('');
    }
    setLoading(false);
  }

  return h('div',{className:'min-h-screen bg-gray-50 flex items-center justify-center'},
    h('div',{className:'bg-white rounded-2xl shadow-lg border p-8 w-full max-w-sm'},
      h('div',{className:'text-center mb-6'},
        h('span',{className:'text-4xl'},'💰'),
        h('h1',{className:'text-xl font-bold text-gray-800 mt-2'},'資金管理'),
        h('p',{className:'text-sm text-gray-400 mt-1'},'パスワードを入力してください')
      ),
      h('form',{onSubmit:submit,className:'space-y-4'},
        h('input',{
          type:'password',
          autoFocus:true,
          className:'w-full border rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400',
          placeholder:'パスワード',
          value:pw,
          onChange:e=>{setPw(e.target.value);setErr(false);}
        }),
        err&&h('p',{className:'text-red-500 text-xs text-center'},'パスワードが違います'),
        h('button',{
          type:'submit',
          disabled:loading||!pw,
          className:'w-full bg-blue-600 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50'
        },loading?'確認中...':'ログイン')
      )
    )
  );
}

// ─── App ─────────────────────────────────────────────
const TABS=['ダッシュボード','口座管理','取引管理'];

function App(){
  const [authed,setAuthed]=useState(()=>sessionStorage.getItem(AUTH_KEY)==='1');
  const [tab,setTab]=useState(0);
  const [accounts,setAccounts]=useState(()=>getAccounts());
  const [txs,setTxs]=useState(()=>getTxs());

  if(!authed) return h(LoginScreen,{onLogin:()=>setAuthed(true)});

  function updAcc(next){ setAccounts(next); saveAccounts(next); }
  function updTxs(next){ setTxs(next); saveTxs(next); }
  function handleGistLoad(accs,txList){ updAcc(accs); updTxs(txList); }

  return h('div',{className:'min-h-screen bg-gray-50'},
    h('header',{className:'bg-white border-b shadow-sm'},
      h('div',{className:'max-w-5xl mx-auto px-4 py-3 flex items-center justify-between'},
        h('div',{className:'flex items-center gap-2'},
          h('span',{className:'text-2xl'},'💰'),
          h('h1',{className:'text-xl font-bold text-gray-800'},'資金管理')
        ),
        h('div',{className:'flex items-center gap-2'},
          h(GistSync,{accounts,txs,onLoad:handleGistLoad}),
          h('nav',{className:'flex gap-1'},
            TABS.map((label,i)=>h('button',{key:i,onClick:()=>setTab(i),
              className:`px-4 py-1.5 rounded-full text-sm font-medium transition-colors ${tab===i?'bg-blue-600 text-white':'text-gray-600 hover:bg-gray-100'}`},label))
          )
        )
      )
    ),
    h('main',{className:'max-w-5xl mx-auto px-4 py-6'},
      tab===0&&h(Dashboard,{accounts,txs}),
      tab===1&&h(AccountManager,{accounts,onChange:updAcc}),
      tab===2&&h(TxManager,{accounts,txs,onChange:updTxs})
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(React.StrictMode,null,h(App)));
</script>
