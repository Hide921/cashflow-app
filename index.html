// ─── Date helpers ─────────────────────────────────────
function sod(d){ const x=new Date(d); x.setHours(0,0,0,0); return x; }
function parseISO(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function fmt(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
const DOW=['日','月','火','水','木','金','土'];
function fmtDisp(s){ const [y,m,d]=s.split('-'); const dt=new Date(Number(y),Number(m)-1,Number(d)); return `${y}/${m}/${d}(${DOW[dt.getDay()]})`; }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function addMonths(d,n){
  const day=d.getDate();
  const x=new Date(d); x.setDate(1); x.setMonth(x.getMonth()+n);
  const last=new Date(x.getFullYear(),x.getMonth()+1,0).getDate();
  x.setDate(Math.min(day,last)); return x;
}
function isAfter(a,b){ return a.getTime()>b.getTime(); }
function isBefore(a,b){ return a.getTime()<b.getTime(); }
const JP_HOLIDAYS=new Set([
  '2025-01-01','2025-01-13','2025-02-11','2025-02-23','2025-02-24',
  '2025-03-20','2025-04-29','2025-05-03','2025-05-04','2025-05-05',
  '2025-07-21','2025-08-11','2025-09-15','2025-09-23','2025-10-13',
  '2025-11-03','2025-11-23','2025-11-24',
  '2026-01-01','2026-01-12','2026-02-11','2026-02-23',
  '2026-03-20','2026-04-29','2026-05-03','2026-05-04','2026-05-05','2026-05-06',
  '2026-07-20','2026-08-11','2026-09-21','2026-09-23','2026-10-12',
  '2026-11-03','2026-11-23',
  '2027-01-01','2027-01-11','2027-02-11','2027-02-23',
  '2027-03-21','2027-04-29','2027-05-03','2027-05-04','2027-05-05',
  '2027-07-19','2027-08-11','2027-09-20','2027-09-23','2027-10-11',
  '2027-11-03','2027-11-23'
]);
function prevBizDay(d){
  let x=new Date(d);
  while(true){ const dow=x.getDay(),ds=fmt(x); if(dow!==0&&dow!==6&&!JP_HOLIDAYS.has(ds)) break; x.setDate(x.getDate()-1); }
  return x;
}
function nextBizDay(d){
  let x=new Date(d);
  while(true){ const dow=x.getDay(),ds=fmt(x); if(dow!==0&&dow!==6&&!JP_HOLIDAYS.has(ds)) break; x.setDate(x.getDate()+1); }
  return x;
}
function todayStr(){ return fmt(sod(new Date())); }
function todayD(){ return sod(new Date()); }

// ─── Storage ──────────────────────────────────────────
function getAccounts(){ try{ return JSON.parse(localStorage.getItem('cf_acc')||'[]'); }catch{ return []; } }
function saveAccounts(v){ localStorage.setItem('cf_acc',JSON.stringify(v)); }
function getTxs(){ try{ return JSON.parse(localStorage.getItem('cf_txs')||'[]'); }catch{ return []; } }
function saveTxs(v){ localStorage.setItem('cf_txs',JSON.stringify(v)); }
function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }

// ─── Forecast ─────────────────────────────────────────
function expandRec(tx, startD, endD){
  const evts=[];
  const base=sod(parseISO(tx.startDate));
  const lim=tx.endDate ? new Date(Math.min(sod(parseISO(tx.endDate)),endD)) : endD;
  const overrides=tx.overrides||{};
  for(let n=0;n<1500;n++){
    let cur;
    if(tx.frequency==='daily') cur=addDays(base,n);
    else if(tx.frequency==='weekly') cur=addDays(base,n*7);
    else if(tx.frequency==='monthly') cur=addMonths(base,n);
    else if(tx.frequency==='yearly') cur=addMonths(base,n*12);
    else break;
    cur=sod(cur);
    if(isAfter(cur,lim)) break;
    const biz=tx.adjustBizDay;
    const adj=biz==='prev'||biz===true ? sod(prevBizDay(cur)) : biz==='next' ? sod(nextBizDay(cur)) : cur;
    if(!isBefore(adj,startD)){
      const raw=overrides[fmt(adj)]!==undefined ? overrides[fmt(adj)] : tx.amount;
      const amt=tx.type==='income'?raw:tx.type==='transfer'?raw:-raw;
      evts.push({date:adj,amt});
    }
  }
  return evts;
}

function buildForecast(accounts, txs, endD){
  const today=todayD();
  const bal={};
  accounts.forEach(a=>{ bal[a.id]=a.balance; });
  const evts=[];
  txs.forEach(tx=>{
    if(tx.recurring){
      if(tx.type==='transfer'){
        expandRec(tx,today,endD).forEach(e=>{
          evts.push({date:e.date,amt:-e.amt,aid:tx.fromAccountId});
          evts.push({date:e.date,amt:e.amt,aid:tx.toAccountId});
        });
      } else {
        expandRec(tx,today,endD).forEach(e=>evts.push({date:e.date,amt:e.amt,aid:tx.accountId}));
      }
    } else {
      const d=sod(parseISO(tx.startDate));
      if(!isBefore(d,today)&&!isAfter(d,endD)){
        if(tx.type==='transfer'){
          evts.push({date:d,amt:-tx.amount,aid:tx.fromAccountId});
          evts.push({date:d,amt:tx.amount,aid:tx.toAccountId});
        } else {
          evts.push({date:d,amt:tx.type==='income'?tx.amount:-tx.amount,aid:tx.accountId});
        }
      }
    }
  });
  evts.sort((a,b)=>a.date-b.date);
  const res=[];
  const cur={...bal};
  let ei=0;
  let cursor=new Date(today);
  while(!isAfter(cursor,endD)){
    const ds=fmt(cursor);
    while(ei<evts.length&&!isAfter(evts[ei].date,cursor)){
      const ev=evts[ei]; if(cur[ev.aid]!==undefined) cur[ev.aid]+=ev.amt; ei++;
    }
    const row={date:ds};
    let tot=0;
    accounts.forEach(a=>{ row[a.id]=Math.round(cur[a.id]); tot+=cur[a.id]; });
    row.total=Math.round(tot);
    res.push(row);
    cursor=addDays(cursor,1);
  }
  return res;
}

// ─── Transaction List for Details ─────────────────────
function buildTxList(txs, endD) {
  const today=todayD();
  const evts=[];
  txs.forEach(tx=>{
    if(tx.recurring){
      if(tx.type==='transfer'){
        expandRec(tx,today,endD).forEach(e=>{
          evts.push({date:fmt(e.date),label:tx.label,category:tx.category||'',type:'transfer',amount:tx.amount,fromAccountId:tx.fromAccountId,toAccountId:tx.toAccountId});
        });
      } else {
        expandRec(tx,today,endD).forEach(e=>{
          evts.push({date:fmt(e.date),label:tx.label,category:tx.category||'',type:tx.type,amount:tx.amount,accountId:tx.accountId});
        });
      }
    } else {
      const d=sod(parseISO(tx.startDate));
      if(!isBefore(d,today)&&!isAfter(d,endD)){
        if(tx.type==='transfer'){
          evts.push({date:fmt(d),label:tx.label,category:tx.category||'',type:'transfer',amount:tx.amount,fromAccountId:tx.fromAccountId,toAccountId:tx.toAccountId});
        } else {
          evts.push({date:fmt(d),label:tx.label,category:tx.category||'',type:tx.type,amount:tx.amount,accountId:tx.accountId});
        }
      }
    }
  });
  evts.sort((a,b)=>a.date.localeCompare(b.date));
  return evts;
}

const FREQS={daily:'毎日',weekly:'毎週',monthly:'毎月',yearly:'毎年'};
const PERIODS=[{label:'1ヶ月',months:1},{label:'3ヶ月',months:3},{label:'6ヶ月',months:6},{label:'1年',months:12}];

// ─── SVG Line Chart ───────────────────────────────────
function SvgChart({ data, accounts, dark }){
  const W=700, H=260, PL=72, PR=20, PT=16, PB=40;
  const iW=W-PL-PR, iH=H-PT-PB;
  const gridColor=dark?'#1e293b':'#f1f5f9';
  const axisColor=dark?'#334155':'#e2e8f0';
  const tickColor=dark?'#94a3b8':'#64748b';
  const dotStroke=dark?'#0f172a':'#ffffff';

  if(!data.length) return h('div',{className:'flex items-center justify-center h-48 text-gray-400 dark:text-gray-500 text-sm'},'口座を追加するとグラフが表示されます');

  const keys=['total',...accounts.map(a=>a.id)];
  const colorMap={total:'#6366f1'};
  accounts.forEach(a=>{ colorMap[a.id]=a.color; });
  const nameMap={total:'合計'};
  accounts.forEach(a=>{ nameMap[a.id]=a.name; });

  const allVals=data.flatMap(d=>keys.map(k=>d[k]??0));
  let minV=Math.min(...allVals), maxV=Math.max(...allVals);
  if(minV===maxV){ minV-=10000; maxV+=10000; }
  const pad=(maxV-minV)*0.08;
  const yMin=minV-pad, yMax=maxV+pad;

  function xp(i){ return PL+i/(data.length-1||1)*iW; }
  function yp(v){ return PT+iH-(v-yMin)/(yMax-yMin)*iH; }
  function fmtY(v){ if(Math.abs(v)>=10000000) return (v/10000000).toFixed(1)+'千万'; if(Math.abs(v)>=10000) return Math.round(v/10000)+'万'; return Math.round(v/1000)+'k'; }

  const ticks=[];
  const step=Math.pow(10,Math.floor(Math.log10(Math.max(1,yMax-yMin)/5)));
  const tickStep=Math.ceil((yMax-yMin)/5/step)*step;
  let tv=Math.ceil(yMin/tickStep)*tickStep;
  while(tv<=yMax){ ticks.push(tv); tv+=tickStep; }

  const xTicks=[];
  const xi=Math.max(1,Math.floor(data.length/6));
  data.forEach((d,i)=>{ if(i%xi===0||i===data.length-1) xTicks.push({i,label:d.date.slice(5)}); });

  const [tip,setTip]=useState(null);

  function onMouseMove(e){
    const rect=e.currentTarget.getBoundingClientRect();
    const mx=e.clientX-rect.left;
    const ix=Math.round((mx-PL)/iW*(data.length-1));
    if(ix>=0&&ix<data.length) setTip({i:ix,x:xp(ix),d:data[ix]});
  }

  const tipStyle=dark
    ?{background:'#1e293b',border:'1px solid #334155',color:'#e2e8f0'}
    :{background:'#ffffff',border:'1px solid #e2e8f0',color:'#374151'};

  return h('div',{className:'relative'},
    h('svg',{width:'100%',viewBox:`0 0 ${W} ${H}`,style:{fontFamily:'inherit'},onMouseMove,onMouseLeave:()=>setTip(null)},
      ticks.map(v=>h('line',{key:v,x1:PL,y1:yp(v),x2:W-PR,y2:yp(v),stroke:gridColor,strokeWidth:1})),
      ticks.map(v=>h('g',{key:'yt'+v},
        h('line',{x1:PL-4,y1:yp(v),x2:PL,y2:yp(v),stroke:axisColor,strokeWidth:1}),
        h('text',{x:PL-6,y:yp(v)+4,textAnchor:'end',fontSize:10,fill:tickColor},fmtY(v))
      )),
      xTicks.map(({i,label})=>h('g',{key:'xt'+i},
        h('line',{x1:xp(i),y1:PT+iH,x2:xp(i),y2:PT+iH+4,stroke:axisColor,strokeWidth:1}),
        h('text',{x:xp(i),y:PT+iH+16,textAnchor:'middle',fontSize:10,fill:tickColor},label)
      )),
      h('line',{x1:PL,y1:PT,x2:PL,y2:PT+iH,stroke:axisColor,strokeWidth:1}),
      h('line',{x1:PL,y1:PT+iH,x2:W-PR,y2:PT+iH,stroke:axisColor,strokeWidth:1}),
      [...accounts.map(a=>a.id),'total'].map(k=>{
        const pts=data.map((d,i)=>`${xp(i)},${yp(d[k]??0)}`).join(' ');
        return h('polyline',{key:k,points:pts,fill:'none',stroke:colorMap[k],strokeWidth:k==='total'?2.5:1.5,strokeDasharray:k==='total'?undefined:'5,3',opacity:0.9});
      }),
      tip && h('line',{x1:tip.x,y1:PT,x2:tip.x,y2:PT+iH,stroke:dark?'#475569':'#94a3b8',strokeWidth:1,strokeDasharray:'3,2'}),
      tip && keys.map(k=>h('circle',{key:k,cx:tip.x,cy:yp(tip.d[k]??0),r:4,fill:colorMap[k],stroke:dotStroke,strokeWidth:1.5}))
    ),
    tip && h('div',{
      className:'absolute rounded-lg shadow-lg p-2.5 text-xs pointer-events-none z-10',
      style:{top:'4px',left:Math.min(tip.x/W*100,65)+'%',...tipStyle}
    },
      h('p',{className:'font-semibold mb-1.5'},(()=>{const [y,m,d]=tip.d.date.split('-');const dt=new Date(Number(y),Number(m)-1,Number(d));return `${y}/${m}/${d}(${DOW[dt.getDay()]})`;})()),
      keys.map(k=>h('p',{key:k,className:'leading-5',style:{color:colorMap[k]}},`${nameMap[k]}: ¥${(tip.d[k]??0).toLocaleString()}`))
    ),
    h('div',{className:'flex flex-wrap gap-3 mt-2 pl-16'},
      keys.map(k=>h('span',{key:k,className:'flex items-center gap-1.5 text-xs text-gray-500 dark:text-gray-400'},
        h('span',{className:'inline-block w-5',style:{height:'2px',backgroundColor:colorMap[k],borderRadius:'1px'}}),
        nameMap[k]
      ))
    )
  );
}

// ─── Account Manager ─────────────────────────────────
function AccountManager({ accounts, onChange }){
  const DEF={name:'',bankName:'',balance:'',color:COLORS[0]};
  const [form,setForm]=useState(DEF);
  const [editId,setEditId]=useState(null);
  const [err,setErr]=useState('');
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));

  function submit(e){
    e.preventDefault();
    if(!form.name.trim()){setErr('口座名を入力してください');return;}
    if(form.balance===''){setErr('残高を入力してください');return;}
    setErr('');
    const item={...form,balance:Number(form.balance)};
    if(editId){ onChange(accounts.map(a=>a.id===editId?{...a,...item}:a)); setEditId(null); }
    else onChange([...accounts,{...item,id:genId()}]);
    setForm(DEF);
  }

  function startEdit(a){ setEditId(a.id); setForm({name:a.name,bankName:a.bankName,balance:String(a.balance),color:a.color}); }
  function cancel(){ setEditId(null); setForm(DEF); setErr(''); }

  return h('div',{className:'space-y-6'},
    h('div',{className:cardCls+' p-5'},
      h('h2',{className:'text-base font-semibold text-gray-800 dark:text-gray-100 mb-4'},editId?'口座を編集':'口座を追加'),
      h('form',{onSubmit:submit,className:'grid grid-cols-2 gap-3'},
        h('div',null,
          h('label',{className:labelCls},'口座名 *'),
          h('input',{className:inputCls,placeholder:'例: 普通預金',value:form.name,onChange:e=>sf('name',e.target.value)})
        ),
        h('div',null,
          h('label',{className:labelCls},'銀行名'),
          h('input',{className:inputCls,placeholder:'例: 三菱UFJ銀行',value:form.bankName,onChange:e=>sf('bankName',e.target.value)})
        ),
        h('div',null,
          h('label',{className:labelCls},'現在残高 (円) *'),
          h('input',{type:'number',className:inputCls,placeholder:'0',value:form.balance,onChange:e=>sf('balance',e.target.value)})
        ),
        h('div',null,
          h('label',{className:labelCls},'カラー'),
          h('div',{className:'flex gap-2 flex-wrap pt-1'},
            COLORS.map(c=>h('button',{key:c,type:'button',onClick:()=>sf('color',c),
              className:`w-7 h-7 rounded-full border-2 transition-all ${form.color===c?'border-gray-900 dark:border-white scale-110':'border-transparent hover:scale-105'}`,
              style:{backgroundColor:c}}))
          )
        ),
        err&&h('p',{className:'col-span-2 text-red-500 dark:text-red-400 text-sm'},err),
        h('div',{className:'col-span-2 flex gap-2'},
          h('button',{type:'submit',className:'bg-gray-900 dark:bg-white text-white dark:text-gray-900 px-5 py-2.5 rounded-xl text-sm font-semibold hover:bg-gray-700 dark:hover:bg-gray-100 transition-colors shadow-sm'},editId?'更新':'追加'),
          editId&&h('button',{type:'button',onClick:cancel,className:'border border-gray-200 dark:border-gray-600 px-5 py-2.5 rounded-xl text-sm text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors'},'キャンセル')
        )
      )
    ),
    h('div',{className:'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4'},
      accounts.length===0&&h('p',{className:'text-gray-400 dark:text-gray-500 text-sm col-span-full py-4'},'口座がまだ登録されていません'),
      accounts.map(a=>h('div',{key:a.id,className:cardCls+' p-4 flex flex-col gap-2'},
        h('div',{className:'flex items-center gap-2'},
          h('span',{className:'w-3 h-3 rounded-full flex-shrink-0',style:{backgroundColor:a.color}}),
          h('span',{className:'font-semibold text-gray-800 dark:text-gray-100 truncate'},a.name)
        ),
        a.bankName&&h('p',{className:'text-xs text-gray-400 dark:text-gray-500'},a.bankName),
        h('p',{className:'text-2xl font-bold text-gray-900 dark:text-gray-100 mt-1'},`¥${a.balance.toLocaleString()}`),
        h('div',{className:'flex gap-3 pt-2 border-t border-gray-100 dark:border-gray-700 mt-1'},
          h('button',{onClick:()=>startEdit(a),className:'text-xs text-indigo-600 dark:text-indigo-400 hover:underline font-medium'},'編集'),
          h('button',{onClick:()=>onChange(accounts.filter(x=>x.id!==a.id)),className:'text-xs text-red-500 dark:text-red-400 hover:underline font-medium'},'削除')
        )
      ))
    )
  );
}

// ─── Amount parser (Japanese shorthand) ───────────────
function parseJpAmt(s){
  if(!s&&s!==0) return null;
  s=String(s).trim().replace(/,/g,'').replace(/[¥￥]/g,'');
  if(/^\d+$/.test(s)) return parseInt(s,10);
  if(/^\d+\.\d+$/.test(s)) return Math.round(parseFloat(s));
  const mMan=s.match(/^(\d+\.?\d*)\s*万\s*(\d+\.?\d*)?\s*千?$/);
  if(mMan){ return Math.round(parseFloat(mMan[1])*10000+(mMan[2]?parseFloat(mMan[2])*1000:0)); }
  const mSen=s.match(/^(\d+\.?\d*)\s*千$/);
  if(mSen) return Math.round(parseFloat(mSen[1])*1000);
  return null;
}

// ─── Transaction Manager ──────────────────────────────
function TxManager({ accounts, txs, onChange }){
  const DEF={label:'',type:'expense',amount:'',category:'その他',accountId:'',fromAccountId:'',toAccountId:'',overrides:{},recurring:false,frequency:'monthly',startDate:todayStr(),endDate:'',adjustBizDay:''};
  const [form,setForm]=useState(DEF);
  const [editId,setEditId]=useState(null);
  const [err,setErr]=useState('');
  const [sugs,setSugs]=useState([]);
  const [showSugs,setShowSugs]=useState(false);
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));

  function handleLabelChange(val){
    sf('label',val);
    if(val.trim()){
      const seen=new Set();
      const matches=txs.filter(tx=>{
        if(!tx.label.toLowerCase().includes(val.toLowerCase())||seen.has(tx.label)) return false;
        seen.add(tx.label); return true;
      }).slice(0,6);
      setSugs(matches); setShowSugs(matches.length>0);
    } else { setShowSugs(false); }
  }
  function selectSug(tx){
    setForm(f=>({...f,label:tx.label,type:tx.type,amount:String(tx.amount),
      accountId:tx.accountId||'',fromAccountId:tx.fromAccountId||'',toAccountId:tx.toAccountId||'',
      recurring:tx.recurring,frequency:tx.frequency||'monthly',

  function removeOverride(ds){ const n={...(form.overrides||{})}; delete n[ds]; sf('overrides',n); }

  function submit(e){
    e.preventDefault();
    if(!form.label.trim()){setErr('名前を入力してください');return;}
    const parsedAmt=parseJpAmt(form.amount);
    if(!parsedAmt||parsedAmt<=0){setErr('金額を入力してください');return;}
    if(form.type==='transfer'){
      if(!form.fromAccountId||!form.toAccountId){setErr('振替元・振替先の口座を選択してください');return;}
      if(form.fromAccountId===form.toAccountId){setErr('振替元と振替先は別の口座を選択してください');return;}
    } else {
      if(!form.accountId){setErr('口座を選択してください');return;}
    }
    setErr('');
    const tx={...form,amount:parsedAmt,endDate:form.endDate||null};
    if(editId){ onChange(txs.map(t=>t.id===editId?{...tx,id:editId}:t)); setEditId(null); }
    else onChange([...txs,{...tx,id:genId()}]);
    setForm({...DEF,accountId:form.accountId});
  }

// ─── Balance Table ────────────────────────────────────
function BalanceTable({ accounts, fData }){
  if(!accounts.length) return null;
  const cols=fData;
  const fmtCol=s=>{
    const [y,mo,d]=s.split('-');
    const dt=new Date(Number(y),Number(mo)-1,Number(d));
    const m=mo.startsWith('0')?mo.slice(1):mo;
    return `${m}/${d}(${DOW[dt.getDay()]})`;
  };
  const fmtYen=v=>v.toLocaleString();

  return h('div',{className:cardCls+' overflow-hidden'},
    h('div',{className:'px-5 py-3 border-b border-gray-200 dark:border-gray-700'},
      h('h2',{className:'text-base font-semibold text-gray-700 dark:text-gray-300'},'口座別 残高推移')
    ),
    h('div',{className:'overflow-x-auto'},
      h('table',{className:'text-sm border-collapse w-full'},
        h('thead',null,
          h('tr',{className:'bg-gray-50 dark:bg-gray-900/60'},
            h('th',{className:'text-left px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400 whitespace-nowrap border-b border-r border-gray-200 dark:border-gray-700 sticky left-0 bg-gray-50 dark:bg-gray-900 z-10'},'口座'),
            cols.map(col=>
              h('th',{key:col.date,className:'px-3 py-2.5 font-medium text-gray-500 dark:text-gray-400 whitespace-nowrap border-b border-gray-200 dark:border-gray-700 text-right min-w-[80px]'},
                fmtCol(col.date))
            )
          )
        ),
        h('tbody',null,
          accounts.map((a,ai)=>{
            const prev=cols.map(col=>col[a.id]??0);
            const hasNeg=cols.some(col=>(col[a.id]??0)<0);
            const rowBg=ai%2===0?'bg-white dark:bg-gray-800':'bg-gray-50/60 dark:bg-gray-800/40';
            const stickyBg=ai%2===0?'bg-white dark:bg-gray-800':'bg-gray-50 dark:bg-gray-800';
            return h('tr',{key:a.id,className:`${rowBg} hover:bg-indigo-50 dark:hover:bg-indigo-900/10 transition-colors`},
              h('td',{className:`px-4 py-2.5 whitespace-nowrap border-r border-gray-200 dark:border-gray-700 sticky left-0 z-10 ${stickyBg}`},
                h('span',{className:'flex items-center gap-2'},
                  h('span',{className:'w-2.5 h-2.5 rounded-full flex-shrink-0',style:{backgroundColor:a.color}}),
                  h('span',{className:'font-medium text-gray-800 dark:text-gray-200'},a.name),
                  a.bankName&&h('span',{className:'text-xs text-gray-400 dark:text-gray-500 ml-1'},a.bankName),
                  hasNeg&&h('span',{className:'text-xs text-red-500 ml-1',title:'マイナス残高あり'},'⚠️')
                )
              ),
              cols.map((col,ci)=>{
                const val=col[a.id]??0;
                const diff=ci>0?(val-(prev[ci-1]??val)):0;
                const neg=val<0;
                return h('td',{key:col.date,className:`px-3 py-2.5 text-right whitespace-nowrap${neg?' bg-red-50 dark:bg-red-950/20':''}`},
                  h('span',{className:`font-semibold ${neg?'text-red-600 dark:text-red-400':'text-gray-800 dark:text-gray-200'}`},`¥${fmtYen(val)}`),
                  ci>0&&diff!==0&&h('span',{className:`block text-xs ${diff>=0?'text-emerald-500 dark:text-emerald-400':'text-red-400'}`},
                    `${diff>=0?'+':''}${fmtYen(diff)}`)
                );
              })
            );
          }),
          h('tr',{className:'font-bold border-t-2 border-indigo-200 dark:border-indigo-800'},
            h('td',{className:'px-4 py-2.5 whitespace-nowrap border-r border-gray-200 dark:border-gray-700 sticky left-0 z-10 text-indigo-700 dark:text-indigo-300 bg-indigo-50 dark:bg-indigo-950/30'},'合計'),
            cols.map((col,ci)=>{
              const val=col.total??0;
              const prevVal=ci>0?(cols[ci-1].total??val):val;
              const diff=ci>0?(val-prevVal):0;
              const neg=val<0;
              return h('td',{key:col.date,className:`px-3 py-2.5 text-right whitespace-nowrap ${neg?'bg-red-100 dark:bg-red-950/20':'bg-indigo-50 dark:bg-indigo-950/20'}`},
                h('span',{className:`${neg?'text-red-700 dark:text-red-400':'text-indigo-700 dark:text-indigo-300'}`},`¥${fmtYen(val)}`),
                ci>0&&diff!==0&&h('span',{className:`block text-xs ${diff>=0?'text-emerald-600 dark:text-emerald-400':'text-red-500 dark:text-red-400'}`},
                  `${diff>=0?'+':''}${fmtYen(diff)}`)
              );
            })
          )
        )
      )
    )
  );
}

// ─── Transaction Details ──────────────────────────────
const TX_PAGE=20;
function TxDetails({ txs, endD, accounts }){
  const [show,setShow]=useState(false);
  const [page,setPage]=useState(0);
  const accMap=useMemo(()=>Object.fromEntries(accounts.map(a=>[a.id,a])),[accounts]);
  const list=useMemo(()=>{
    if(!txs.length||!accounts.length) return [];
    return buildTxList(txs,endD);
  },[txs,endD,accounts]);

  if(!accounts.length) return null;
  const shown=(page+1)*TX_PAGE;

  return h('div',{className:cardCls},
    h('button',{
      onClick:()=>{setShow(v=>!v);setPage(0);},
      className:'w-full flex items-center justify-between px-5 py-4 text-left hover:bg-gray-50 dark:hover:bg-gray-700/40 transition-colors rounded-xl'
    },
      h('span',{className:'text-base font-semibold text-gray-700 dark:text-gray-300 flex items-center gap-2'},
        '予定明細',
        list.length>0&&h('span',{className:'text-xs font-normal text-gray-400 dark:text-gray-500 bg-gray-100 dark:bg-gray-700 px-2 py-0.5 rounded-full'},`${list.length}件`)
      ),
      h('span',{className:'text-gray-400 dark:text-gray-500 text-sm select-none'},show?'▲':'▼')
    ),
    show&&h('div',null,
      list.length===0
        ?h('div',{className:'text-center py-8 text-gray-400 dark:text-gray-500 text-sm border-t border-gray-100 dark:border-gray-700'},'この期間に予定された取引はありません')
        :h('div',null,
            h('div',{className:'overflow-x-auto border-t border-gray-100 dark:border-gray-700'},
              h('table',{className:'w-full text-sm'},
                h('thead',{className:'bg-gray-50 dark:bg-gray-900/60 text-gray-500 dark:text-gray-400 text-xs uppercase tracking-wider'},
                  h('tr',null,
                    ['日付','名前','カテゴリ','口座','金額'].map((col,i)=>
                      h('th',{key:i,className:`px-4 py-3 font-medium ${i===4?'text-right':'text-left'}`},col))
                  )
                ),
                h('tbody',{className:'divide-y divide-gray-100 dark:divide-gray-700'},
                  list.slice(0,shown).map((ev,i)=>{
                    const acc=accMap[ev.accountId];
                    const fromAcc=accMap[ev.fromAccountId];

}

// ─── Dashboard ───────────────────────────────────────
function Dashboard({ accounts, txs, dark }){
  const [pIdx,setPIdx]=useState(1);
  const endD=useMemo(()=>addMonths(todayD(),PERIODS[pIdx].months),[pIdx]);
  const fullData=useMemo(()=>{
    if(!accounts.length) return [];
    return buildForecast(accounts,txs,endD);
  },[accounts,txs,endD,pIdx]);
  const fData=useMemo(()=>{
    const step=PERIODS[pIdx].months<=1?1:7;
    return fullData.filter((_,i)=>i%step===0);
  },[fullData,pIdx]);

  const totalBal=accounts.reduce((s,a)=>s+a.balance,0);
  const monthly=useMemo(()=>{
    let inc=0,exp=0;
    txs.filter(tx=>tx.recurring&&tx.type!=='transfer').forEach(tx=>{
      const m=tx.frequency==='monthly'?1:tx.frequency==='yearly'?1/12:tx.frequency==='weekly'?4:30;
      if(tx.type==='income') inc+=Math.round(tx.amount*m);
      else exp+=Math.round(tx.amount*m);
    });
    return {inc,exp};
  },[txs]);

  const net=monthly.inc-monthly.exp;

  return h('div',{className:'space-y-5'},
    h('div',{className:'grid grid-cols-1 sm:grid-cols-3 gap-4'},
      h('div',{className:'rounded-2xl bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700/60 p-6 shadow-[0_1px_8px_rgba(0,0,0,0.06)] dark:shadow-none'},
        h('p',{className:'text-[11px] font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-3'},'総資産'),
        h('p',{className:'text-5xl font-bold text-gray-900 dark:text-gray-100 tabular-nums tracking-tight leading-none'},`¥${totalBal.toLocaleString()}`),
        h('p',{className:'text-xs text-gray-400 dark:text-gray-500 mt-3'},`${accounts.length}口座`)

      h('div',{className:'rounded-2xl bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700/60 p-6 shadow-[0_1px_8px_rgba(0,0,0,0.06)] dark:shadow-none'},
        h('p',{className:'text-[11px] font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-3'},'月間収入（定期）'),
        h('p',{className:'text-4xl font-bold text-emerald-500 dark:text-emerald-400 tabular-nums tracking-tight leading-none'},`+¥${monthly.inc.toLocaleString()}`)
      ),
      h('div',{className:'rounded-2xl bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700/60 p-6 shadow-[0_1px_8px_rgba(0,0,0,0.06)] dark:shadow-none'},
        h('p',{className:'text-[11px] font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-3'},'月間支出（定期）'),
        h('p',{className:'text-4xl font-bold text-rose-500 dark:text-rose-400 tabular-nums tracking-tight leading-none'},`-¥${monthly.exp.toLocaleString()}`),
        h('p',{className:`text-xs font-medium mt-3 ${net>=0?'text-emerald-500 dark:text-emerald-400':'text-rose-400'}`},
          `収支 ${net>=0?'+':''}¥${net.toLocaleString()}`)
      )
    ),
    h(BalanceTable,{accounts,fData:fullData}),
    accounts.length>0&&h('div',{className:'grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3'},
      accounts.map(a=>h('div',{key:a.id,className:cardCls+' p-3'},

          h('span',{className:'w-2.5 h-2.5 rounded-full flex-shrink-0',style:{backgroundColor:a.color}}),

// ─── Gist Sync ────────────────────────────────────────
const GIST_FILE='cashflow-data.json';
const LS_TOKEN='cf_gh_token';
const LS_GIST_ID='cf_gist_id';
const LS_LAST_SYNC='cf_last_sync';

async function gistSave(token,gistId,accounts,txs){
  const content=JSON.stringify({accounts,transactions:txs},null,2);
  const hdrs={'Authorization':`Bearer ${token}`,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'};
  if(gistId){
    const r=await fetch(`https://api.github.com/gists/${gistId}`,{method:'PATCH',headers:hdrs,body:JSON.stringify({files:{[GIST_FILE]:{content}}})});
    if(!r.ok) throw new Error(`更新失敗: ${r.status}`);
    return gistId;
  } else {
    const r=await fetch('https://api.github.com/gists',{method:'POST',headers:hdrs,body:JSON.stringify({description:'資金管理アプリ データ',public:false,files:{[GIST_FILE]:{content}}})});
    if(!r.ok) throw new Error(`作成失敗: ${r.status}`);
    const d=await r.json();
    return d.id;
  }
}

async function gistLoad(token,gistId){
  const hdrs={'Authorization':`Bearer ${token}`,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'};
  const r=await fetch(`https://api.github.com/gists/${gistId}`,{headers:hdrs});
  if(!r.ok) throw new Error(`読み込み失敗: ${r.status}`);
  const d=await r.json();
  const f=d.files[GIST_FILE];
  if(!f) throw new Error(`${GIST_FILE} が見つかりません`);
  return JSON.parse(f.content);
}

function GistSync({accounts,txs,onLoad}){
  const [open,setOpen]=useState(false);
  const [token,setToken]=useState(()=>localStorage.getItem(LS_TOKEN)||'');
  const [gistId,setGistId]=useState(()=>localStorage.getItem(LS_GIST_ID)||'');
  const [status,setStatus]=useState(null);
  const [busy,setBusy]=useState(false);
  const lastSync=localStorage.getItem(LS_LAST_SYNC);

  function save(){localStorage.setItem(LS_TOKEN,token);localStorage.setItem(LS_GIST_ID,gistId);}

  async function handleSave(){
    if(!token){setStatus({ok:false,msg:'トークンを入力してください'});return;}
    setBusy(true);setStatus(null);
    try{
      save();
      const id=await gistSave(token,gistId||null,accounts,txs);
      localStorage.setItem(LS_GIST_ID,id);
      localStorage.setItem(LS_LAST_SYNC,new Date().toLocaleString('ja-JP'));
      setGistId(id);
      setStatus({ok:true,msg:'クラウドに保存しました'});
    }catch(e){setStatus({ok:false,msg:e.message});}
    setBusy(false);
  }

  async function handleLoad(){
    if(!token){setStatus({ok:false,msg:'トークンを入力してください'});return;}
    if(!gistId){setStatus({ok:false,msg:'Gist ID を入力してください'});return;}
    setBusy(true);setStatus(null);
    try{
      save();
      const d=await gistLoad(token,gistId);
      localStorage.setItem(LS_LAST_SYNC,new Date().toLocaleString('ja-JP'));
      onLoad(d.accounts,d.transactions);
      setStatus({ok:true,msg:'クラウドから読み込みました'});
      setOpen(false);
    }catch(e){setStatus({ok:false,msg:e.message});}
    setBusy(false);
  }

  return h('div',{className:'relative'},
    h('button',{
      onClick:()=>setOpen(v=>!v),
      className:'flex items-center gap-1.5 px-3 py-1.5 rounded-full text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors',
      title:'GitHub Gist 同期'
    },
      h('svg',{className:'w-4 h-4',viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:'2'},
        h('path',{d:'M8 17l4 4 4-4M12 12v9'}),
        h('path',{d:'M20.88 18.09A5 5 0 0018 9h-1.26A8 8 0 103 16.29'})
      ),
      '同期',
      lastSync&&h('span',{className:'text-xs text-gray-400 dark:text-gray-500 hidden sm:inline'},lastSync)
    ),
    open&&h(React.Fragment,null,
      h('div',{className:'fixed inset-0 z-10',onClick:()=>setOpen(false)}),
      h('div',{className:'absolute right-0 top-10 z-20 w-80 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl shadow-xl p-4 space-y-3'},
        h('h3',{className:'font-semibold text-gray-800 dark:text-gray-100 text-sm'},'GitHub Gist 同期'),
        h('div',null,
          h('label',{className:labelCls},'Personal Access Token（gist スコープ必須）'),
          h('input',{type:'password',value:token,onChange:e=>setToken(e.target.value),placeholder:'ghp_xxxxxxxxxxxx',className:inputCls})
        ),
        h('div',null,
          h('label',{className:labelCls},'Gist ID（初回保存時に自動設定）'),
          h('input',{type:'text',value:gistId,onChange:e=>setGistId(e.target.value),placeholder:'（空欄で新規作成）',
            className:inputCls+' font-mono'})
        ),
        status&&h('p',{className:`text-xs px-3 py-2 rounded-lg ${status.ok?'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-700 dark:text-emerald-400':'bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400'}`},status.msg),
        h('div',{className:'flex gap-2 pt-1'},
          h('button',{onClick:handleSave,disabled:busy,className:'flex-1 bg-indigo-600 text-white text-sm font-medium rounded-lg py-2 hover:bg-indigo-700 disabled:opacity-50 transition-colors'},busy?'処理中…':'クラウドに保存'),
          h('button',{onClick:handleLoad,disabled:busy,className:'flex-1 border border-gray-300 dark:border-gray-600 text-sm font-medium rounded-lg py-2 text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 disabled:opacity-50 transition-colors'},busy?'処理中…':'クラウドから読込')
        ),
        h('p',{className:'text-xs text-gray-400 dark:text-gray-500'},'トークンはブラウザのみに保存されます。')
      )
    )
  );
}

// ─── Upcoming Payments ────────────────────────────────
function UpcomingPayments({txs,accounts}){
  const today=todayD();
  const end30=addDays(today,30);
  const accMap={};
  accounts.forEach(a=>{accMap[a.id]=a;});
  const events=[];
  txs.forEach(tx=>{
    if(tx.type==='transfer') return;
    if(tx.recurring){
      expandRec(tx,today,end30).forEach(e=>{
        events.push({date:fmt(e.date),label:tx.label,amount:Math.abs(e.amt),type:tx.type,daysLeft:Math.round((e.date-today)/86400000)});
      });
    } else {
      const d=sod(parseISO(tx.startDate));
      if(!isBefore(d,today)&&!isAfter(d,end30)){
        events.push({date:fmt(d),label:tx.label,amount:tx.amount,type:tx.type,daysLeft:Math.round((d-today)/86400000)});
      }
    }
  });
  events.sort((a,b)=>a.date.localeCompare(b.date));
  if(!events.length) return null;
  return h('div',{className:cardCls+' p-5'},
    h('div',{className:'flex items-center gap-2.5 mb-4'},
      h('div',{className:'w-8 h-8 rounded-lg bg-amber-100 dark:bg-amber-900/50 flex items-center justify-center'},
        h('svg',{className:'w-4 h-4 text-amber-600 dark:text-amber-400',viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:'2'},
          h('rect',{x:'3',y:'4',width:'18',height:'18',rx:'2',ry:'2'}),
          h('line',{x1:'16',y1:'2',x2:'16',y2:'6'}),
          h('line',{x1:'8',y1:'2',x2:'8',y2:'6'}),
          h('line',{x1:'3',y1:'10',x2:'21',y2:'10'})
        )
      ),
      h('h2',{className:'text-base font-semibold text-gray-700 dark:text-gray-300'},'直近30日の予定'),
      h('span',{className:'ml-auto text-xs bg-amber-100 dark:bg-amber-900/40 text-amber-600 dark:text-amber-400 rounded-full px-2 py-0.5 font-medium'},`${events.length}件`)
    ),
    h('div',{className:'divide-y divide-gray-100 dark:divide-gray-700'},
      events.slice(0,8).map((ev,i)=>
        h('div',{key:i,className:'flex items-center gap-3 py-2.5'},
          h('div',{className:`w-11 text-center flex-shrink-0 rounded-lg py-1 ${ev.daysLeft===0?'bg-amber-100 dark:bg-amber-900/40':'bg-gray-50 dark:bg-gray-700/50'}`},
            h('div',{className:`text-base font-bold leading-none tabular-nums ${ev.daysLeft===0?'text-amber-600 dark:text-amber-400':'text-gray-600 dark:text-gray-300'}`},ev.daysLeft===0?'今日':ev.daysLeft),
            ev.daysLeft>0&&h('div',{className:'text-xs text-gray-400 dark:text-gray-500 mt-0.5'},'日後')
          ),
          h('div',{className:'flex-1 min-w-0'},
            h('p',{className:'text-sm font-medium text-gray-800 dark:text-gray-200 truncate'},ev.label),
            h('p',{className:'text-xs text-gray-400 dark:text-gray-500 mt-0.5'},ev.date.slice(5).replace('-','/'))
          ),
          h('div',{className:`text-sm font-bold tabular-nums ${ev.type==='income'?'text-emerald-600 dark:text-emerald-400':'text-rose-500 dark:text-rose-400'}`},
            `${ev.type==='income'?'+':'-'}¥${ev.amount.toLocaleString()}`)
        )
      ),
      events.length>8&&h('p',{className:'text-xs text-gray-400 dark:text-gray-500 text-center py-2'},`他 ${events.length-8} 件`)
    )
  );
}
