name: Daily Backup

on:
  schedule:
    - cron: '0 15 * * *'  # 毎日 0:00 JST (= UTC 15:00)
  workflow_dispatch:       # 手動実行も可

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch data from Supabase
        env:
          SUPABASE_URL: https://ugyashjjxoezvlnjtizw.supabase.co
          # RLS適用後も全ユーザー分をバックアップできるよう、
          # Repository secret に SUPABASE_SERVICE_ROLE_KEY を登録する。
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          mkdir -p backups
          DATE=$(date -u +"%Y-%m-%d")

          DATA=$(curl -sf \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            "${SUPABASE_URL}/rest/v1/user_data?select=*")

          if [ -z "$DATA" ] || [ "$DATA" = "[]" ]; then
            echo "No data returned, skipping backup."
            exit 0
          fi

          echo "$DATA" > "backups/${DATE}.json"
          echo "Saved backups/${DATE}.json"

      - name: Commit backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --staged --quiet && echo "No changes to commit." || \
            (git commit -m "backup: $(date -u +'%Y-%m-%d')" && git push)
